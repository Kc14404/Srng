<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMAT Focus — Data Insights</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left:'$$',right:'$$',display:true},
        {left:'\\(',right:'\\)',display:false}
      ],
      throwOnError: false
    })">
  </script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #22263a;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --text: #e8eaf0;
      --muted: #8b90a7;
      --border: #2e3248;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 32px 24px 28px;
      text-align: center;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--muted); margin-top: 8px; font-size: 0.95rem; }

    .hub {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .topic-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
      min-width: 0;
    }
    .topic-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 8px 30px rgba(108,99,255,0.15); }
    .topic-card.active { border-color: var(--accent2); }

    .card-header {
      padding: 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .card-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface);
      border-radius: 10px;
    }
    .card-meta h2 { font-size: 1rem; font-weight: 600; }
    .card-meta .preview {
      font-size: 0.82rem;
      color: var(--accent2);
      margin-top: 4px;
    }
    .card-meta .desc { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
    .expand-arrow { margin-left: auto; font-size: 0.75rem; color: var(--muted); transition: transform 0.3s; align-self: center; flex-shrink: 0; }
    .topic-card.active .expand-arrow { transform: rotate(180deg); }

    .detail-panel { display: none; background: var(--surface); border-top: 1px solid var(--border); }
    .topic-card.active .detail-panel { display: block; }

    .detail-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab-btn {
      padding: 10px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }

    .tab-content { display: none; padding: 20px; min-width: 0; overflow: hidden; }
    .tab-content.active { display: block; }

    /* Equations */
    .eq-list { display: flex; flex-direction: column; gap: 10px; }
    .eq-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }
    .eq-item .eq-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .eq-item .eq-note { font-size: 0.78rem; color: var(--muted); margin-top: 8px; word-break: break-word; }
    .eq-formula { overflow-x: hidden; max-width: 100%; }
    .eq-formula .katex, .eq-formula .katex-html { white-space: normal !important; }
    .eq-plain-text { color: var(--accent2); font-size: 0.95rem; line-height: 1.6; display: block; word-break: break-word; }
    .eq-chevron { float: right; font-size: 0.7rem; color: var(--muted); transition: transform 0.25s; line-height: 1.8; }
    .eq-item.open .eq-chevron { transform: rotate(180deg); }
    .eq-item .eq-detail { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .eq-item.open .eq-detail { max-height: 500px; }
    .eq-detail-inner { padding-top: 10px; margin-top: 8px; border-top: 1px solid var(--border); font-size: 0.82rem; color: #9aa3b8; line-height: 1.65; }

    /* Details */
    .rule-list { display: flex; flex-direction: column; gap: 10px; }
    .rule-item {
      background: var(--card);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 12px 14px;
      font-size: 0.84rem;
      line-height: 1.6;
      overflow-x: auto;
      min-width: 0;
    }
    .rule-item strong { color: var(--accent2); }
    .rule-item code {
      font-family: 'Courier New', monospace;
      background: rgba(108,99,255,0.12);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.88em;
      color: #a78bfa;
    }

    .section-title {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin: 16px 0 6px;
      font-weight: 700;
    }
    .section-title:first-child { margin-top: 0; }

    /* Practice */
    .practice-list { display: flex; flex-direction: column; gap: 14px; }
    .practice-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .practice-q {
      padding: 14px 16px;
      font-size: 0.85rem;
      line-height: 1.6;
      cursor: pointer;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      transition: background 0.15s;
    }
    .practice-q:hover { background: rgba(108,99,255,0.05); }
    .q-num {
      flex-shrink: 0;
      width: 22px; height: 22px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      margin-top: 1px;
    }
    .q-text { flex: 1; }
    .q-toggle { flex-shrink: 0; color: var(--muted); font-size: 0.7rem; transition: transform 0.2s; }
    .practice-item.show-ans .q-toggle { transform: rotate(180deg); }

    .practice-ans {
      display: none;
      padding: 12px 16px 14px 48px;
      border-top: 1px solid var(--border);
      font-size: 0.83rem;
      line-height: 1.6;
      color: var(--muted);
      background: rgba(0,212,170,0.04);
    }
    .practice-item.show-ans .practice-ans { display: block; }
    .practice-ans .ans-label { font-size: 0.68rem; color: var(--accent2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .practice-ans .step { margin-bottom: 4px; }

    /* KaTeX overrides */
    .katex { color: var(--accent2); }
    .eq-item .katex { font-size: 1.05rem; }
    .practice-q .katex, .practice-ans .katex { font-size: 0.9rem; color: #a78bfa; }
    .rule-item .katex { font-size: 0.88rem; color: #a78bfa; }

    /* Prevent KaTeX display math from overflowing */
    .katex-display {
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100%;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .katex-display > .katex { max-width: none; }

    /* Global overflow safety */
    .eq-item, .rule-item, .practice-q, .practice-ans {
      overflow-wrap: break-word;
      word-break: break-word;
    }
    @media (max-width: 480px) {
      .eq-item .katex { font-size: 0.95rem; }
    }

    /* Nav bar */
    .site-nav {
      background: #1a1d27;
      border-bottom: 1px solid #2e3248;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
    }
    .nav-brand {
      font-weight: 800;
      font-size: 0.9rem;
      color: #6c63ff;
      padding: 14px 20px 14px 0;
      text-decoration: none;
      flex-shrink: 0;
      border-right: 1px solid #2e3248;
      margin-right: 8px;
    }
    .nav-link {
      padding: 14px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #8b90a7;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .nav-link:hover { color: #e8eaf0; }
    .nav-link.active { color: #00d4aa; border-bottom-color: #00d4aa; }

    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .hub { grid-template-columns: 1fr; }
    }

    .ref-term {
      color: #a78bfa;
      border-bottom: 1px dashed #a78bfa;
      cursor: pointer;
      position: relative;
      white-space: nowrap;
    }
    .ref-tip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e2130;
      border: 1px solid #3a3d50;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.78rem;
      color: #b0b8cc;
      line-height: 1.5;
      width: 230px;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      pointer-events: none;
    }
    .ref-term.tip-active .ref-tip { display: block; }

    .method-list { display: flex; flex-direction: column; gap: 14px; }
    .method-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .method-name { font-size: 0.95rem; font-weight: 600; color: var(--accent2); margin-bottom: 6px; }
    .method-when { font-size: 0.82rem; color: var(--muted); margin-bottom: 8px; }
    .method-steps { margin: 8px 0 8px 16px; font-size: 0.84rem; line-height: 1.7; color: #c8d0e0; }
    .method-steps li { margin-bottom: 4px; }
    .method-tip { font-size: 0.8rem; color: #a78bfa; font-style: italic; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

    .tq-list { display: flex; flex-direction: column; gap: 14px; }
    .tq-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .tq-header { padding: 16px; cursor: pointer; transition: background 0.15s; }
    .tq-header:hover { background: rgba(108,99,255,0.07); }
    .tq-type-badge { display: inline-block; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; background: rgba(108,99,255,0.18); color: #a78bfa; border-radius: 4px; padding: 2px 8px; margin-bottom: 10px; }
    .tq-question { font-size: 0.86rem; color: #dde2f0; line-height: 1.7; white-space: pre-line; }
    .tq-cta-1 { font-size: 0.74rem; color: var(--muted); margin-top: 10px; transition: color 0.15s; }
    .tq-item.tq-open1 .tq-cta-1 { color: var(--accent2); }
    .tq-layer1 { display: none; border-top: 1px solid var(--border); padding: 14px 16px; background: rgba(0,0,0,0.18); }
    .tq-item.tq-open1 .tq-layer1 { display: block; }
    .tq-analysis { margin-bottom: 14px; }
    .tq-a-row { font-size: 0.83rem; line-height: 1.6; color: #b8c0d4; margin-bottom: 6px; }
    .tq-a-label { font-weight: 600; color: #e0e4f0; margin-right: 4px; }
    .tq-sol-btn { background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.35); color: #a78bfa; border-radius: 6px; padding: 7px 14px; font-size: 0.8rem; font-weight: 600; cursor: pointer; width: 100%; text-align: center; transition: background 0.15s; margin-bottom: 0; }
    .tq-sol-btn:hover { background: rgba(108,99,255,0.25); }
    .tq-layer2 { display: none; padding-top: 14px; border-top: 1px solid var(--border); margin-top: 12px; }
    .tq-item.tq-open2 .tq-layer2 { display: block; }
    .tq-steps { margin: 0 0 0 16px; font-size: 0.84rem; line-height: 1.75; color: #c0c8dc; }
    .tq-steps li { margin-bottom: 6px; }
    .tq-steps li:last-child { color: #7dd3a8; font-weight: 600; }
    .tq-scenario { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 16px; font-size: 0.82rem; }
    .tq-scenario-title { font-weight: 600; color: var(--accent2); margin-bottom: 10px; }
    .tq-scenario table { width: 100%; border-collapse: collapse; font-size: 0.78rem; margin-top: 8px; }
    .tq-scenario th, .tq-scenario td { padding: 6px 8px; border: 1px solid var(--border); text-align: left; }
    .tq-scenario th { background: rgba(108,99,255,0.12); color: #a78bfa; font-weight: 600; }
    .tq-scenario td { color: #b8c0d4; }

    /* ── Desktop Layout (≥1024px) ── */
    @media (min-width: 1024px) {
      body { display: flex; flex-direction: row; min-height: 100vh; overflow-x: hidden; }
      .dt-sidebar {
        width: 240px; min-width: 240px; height: 100vh; position: sticky; top: 0;
        background: #0e0f1a; border-right: 1px solid rgba(255,255,255,0.07);
        display: flex; flex-direction: column; padding: 0; overflow-y: auto; z-index: 100;
        scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
      }
      .dt-logo { display: flex; align-items: center; gap: 10px; padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,0.07); }
      .dt-logo-icon { font-size: 1.3rem; }
      .dt-logo-text { font-size: 1rem; font-weight: 700; color: #e0e4f0; letter-spacing: 0.02em; }
      .dt-nav { padding: 14px 12px 10px; }
      .dt-nav-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.3); padding: 0 8px; margin-bottom: 6px; }
      .dt-nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 7px; font-size: 0.84rem; color: rgba(255,255,255,0.55); text-decoration: none; transition: all 0.15s; margin-bottom: 2px; }
      .dt-nav-item:hover { background: rgba(255,255,255,0.06); color: #e0e4f0; }
      .dt-nav-item.dt-active { background: rgba(108,99,255,0.18); color: #a78bfa; font-weight: 600; }
      .dt-nav-icon { font-size: 0.95rem; width: 20px; text-align: center; }
      .dt-topics { padding: 10px 12px; border-top: 1px solid rgba(255,255,255,0.07); flex: 1; overflow-y: auto; }
      .dt-topics-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.3); padding: 0 8px; margin-bottom: 6px; }
      .dt-topic-link { display: block; padding: 7px 10px; border-radius: 6px; font-size: 0.8rem; color: rgba(255,255,255,0.45); text-decoration: none; cursor: pointer; transition: all 0.15s; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: none; background: none; width: 100%; text-align: left; }
      .dt-topic-link:hover { background: rgba(255,255,255,0.05); color: #c0c8dc; }
      .dt-topic-link.dt-topic-active { color: var(--accent2, #7dd3a8); font-weight: 500; }
      .dt-sidebar-footer { padding: 14px 12px; border-top: 1px solid rgba(255,255,255,0.07); }
      .dt-footer-btn { width: 100%; padding: 9px; background: rgba(108,99,255,0.12); border: 1px solid rgba(108,99,255,0.3); border-radius: 8px; color: #a78bfa; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
      .dt-footer-btn:hover { background: rgba(108,99,255,0.22); }
      .site-nav { display: none; }
      .dt-main-wrap { flex: 1; min-width: 0; overflow-x: hidden; }
      .hub { max-width: none; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 32px 36px; }
      .topic-card.active { grid-column: 1 / -1; }
      header { text-align: left; padding: 32px 36px 28px; }
    }
  </style>
</head>

<header>
  <h1>GMAT Focus — Data Insights</h1>
  <p>Click any topic to explore frameworks, rules, and practice problems.</p>
</header>

<div class="hub" id="hub"></div>

<script>
const topics = [
  {
    icon: "⚖️",
    title: "DS Framework",
    preview: "A · B · C · D · E",
    desc: "Data Sufficiency answer choices and evaluation method",
    equations: [
      { label: "Answer A", formula: "$$\\text{Statement 1 ALONE is sufficient; Statement 2 alone is NOT}$$", detail: "<strong>Definition:</strong> Statement 1 alone is sufficient; Statement 2 alone is NOT.<br><strong>Strategy:</strong> Evaluate S1 completely in isolation — pretend S2 doesn't exist.<br><strong>Rule:</strong> For yes/no questions, a definite NO counts as sufficient.<br><strong>Common mistake:</strong> Checking S1 and S2 together before confirming S1 alone." },
      { label: "Answer B", formula: "$$\\text{Statement 2 ALONE is sufficient; Statement 1 alone is NOT}$$", detail: "<strong>Definition:</strong> Statement 2 alone is sufficient; Statement 1 alone is NOT.<br><strong>Strategy:</strong> Evaluate S2 completely in isolation — pretend you've never seen S1.<br><strong>Common mistake:</strong> After finding S1 insufficient, rushing to B without properly testing S2 alone." },
      { label: "Answer C", formula: "$$\\text{BOTH statements TOGETHER are sufficient, but NEITHER alone}$$", detail: "<strong>Definition:</strong> BOTH statements together are sufficient; neither alone is.<br><strong>Process:</strong> Only consider combining after confirming each statement fails individually.<br><strong>Example:</strong> S1 gives x, S2 gives y — together you can solve for x+y.<br><strong>Common mistake:</strong> Jumping to C without properly isolating each statement first." },
      { label: "Answer D", formula: "$$\\text{EACH statement ALONE is sufficient}$$", detail: "<strong>Definition:</strong> EACH statement, independently, is sufficient on its own.<br><strong>Strategy:</strong> If S1 is sufficient (answer is A or D), test S2 independently — if it also works, upgrade to D.<br><strong>Common mistake:</strong> Finding S1 sufficient and stopping — missing that S2 also works independently." },
      { label: "Answer E", formula: "$$\\text{Statements 1 and 2 TOGETHER are NOT sufficient}$$", detail: "<strong>Definition:</strong> Even combining BOTH statements doesn't give a definite answer.<br><strong>How to confirm:</strong> Construct two different scenarios — both satisfying all conditions — that give different answers.<br><strong>Rule:</strong> If you can find even one ambiguous case using both statements, the answer is E.<br><strong>Common mistake:</strong> Giving up before truly checking if combining helps." },
      { label: "Value Question", formula: "$$\\text{Need exactly ONE numerical answer}$$", detail: "<strong>Definition:</strong> The question asks for a specific number (e.g., \"What is x?\").<br><strong>Sufficient condition:</strong> A statement is sufficient if it narrows down to EXACTLY ONE value.<br><strong>Rule:</strong> You don't need to calculate the actual answer — just confirm only one value is possible.<br><strong>Common mistake:</strong> Accepting a statement as sufficient when it allows two possible values." },
      { label: "Yes/No Question", formula: "$$\\text{Need a DEFINITE yes OR a DEFINITE no}$$", detail: "<strong>Definition:</strong> The question asks if something is definitely true (e.g., \"Is x > 0?\").<br><strong>Sufficient condition:</strong> A statement must give a CONSISTENT answer — always YES or always NO.<br><strong>Rule:</strong> A definite \"No\" IS sufficient — consistency is what matters, not which answer.<br><strong>Common mistake:</strong> Thinking \"sufficient\" means the answer must be YES." }
    ],
    details: [
      { type: "title", text: "Evaluation Process" },
      { type: "rule", text: "<strong>Step 1:</strong> Evaluate Statement 1 alone → Sufficient or Not?" },
      { type: "rule", text: "<strong>Step 2:</strong> Evaluate Statement 2 alone → Sufficient or Not?" },
      { type: "rule", text: "<strong>Step 3:</strong> If neither alone works, combine both → Sufficient or Not?" },
      { type: "title", text: "AD/BCE Split" },
      { type: "rule", text: "If S1 sufficient → answer is <strong>A or D</strong>. Then test S2: if also sufficient → D, if not → A." },
      { type: "rule", text: "If S1 NOT sufficient → answer is <strong>B, C, or E</strong>. Then test S2: if sufficient → B, if not → test both together: sufficient → C, not → E." },
      { type: "title", text: "Key Principles" },
      { type: "rule", text: "<strong>Never calculate the actual answer</strong> — only determine IF it CAN be answered." },
      { type: "rule", text: "<strong>Yes/No trap:</strong> 'Sometimes yes + sometimes no' = NOT sufficient. A definite 'no' IS sufficient." }
    ],
    practice: [
      {
        q: "What is the value of \\(x\\)? (1) \\(x^2 = 9\\) (2) \\(x > 0\\)",
        steps: [
          "S1: \\(x^2 = 9\\) → \\(x = 3\\) or \\(x = -3\\). Two values → Not sufficient.",
          "S2: \\(x > 0\\) → infinite positive values → Not sufficient.",
          "Both: \\(x^2 = 9\\) AND \\(x > 0\\) → \\(x = 3\\) only. One value → <strong>Sufficient.</strong>",
          "<strong>Answer: C</strong>"
        ]
      },
      {
        q: "Is \\(x > 0\\)? (1) \\(x^3 > 0\\) (2) \\(x^2 > 0\\)",
        steps: [
          "S1: \\(x^3 > 0\\). Since cubing preserves sign, \\(x > 0\\). Definite YES → Sufficient.",
          "S2: \\(x^2 > 0\\). Both positive and negative numbers have positive squares. Could be yes or no → Not sufficient.",
          "<strong>Answer: A</strong> (S1 alone sufficient, S2 not)"
        ]

        q: "A 2-person committee is to be selected from: Alice, Bob, Carol, Dana, Eve.\nConstraints:\n• Alice and Dana refuse to serve together.\n• If Bob is selected, Carol must also be selected.\n\nSelect one person for Seat 1 and one for Seat 2 such that all constraints are met. How many valid committees are possible?\n\n(A) 4\n(B) 5\n(C) 6\n(D) 7\n(E) 8",
        type: "Combinatorial logic with constraints — systematic enumeration with elimination of invalid pairs",
        signals: "Selection from a small set with conditional and exclusion constraints. Enumerate all C(5,2) = 10 pairs, then eliminate violations.",
        trap: "(D) 7 — forgetting that Bob-without-Carol pairs are invalid, or (E) 8 — missing the Alice-Dana exclusion.",
        method: "List all C(5,2) = 10 pairs. Remove pairs violating either constraint.",
        steps: ["All 10 pairs: AB, AC, AD, AE, BC, BD, BE, CD, CE, DE", "Remove Alice+Dana: AD ✗. Remaining: 9", "Remove Bob-without-Carol pairs: AB ✗, BD ✗, BE ✗. Remaining: 6", "Valid pairs: AC, AE, BC, CD, CE, DE", "Answer: (C) 6 valid committees"]
      },
      {
        subtype: "Optimization: Budget Allocation",
        q: "A company allocates its $500K budget between R&D and Marketing.\n• R&D must receive at least 40% of total budget.\n• Marketing must receive at least $100K.\n\nTo maximize R&D spending, select the R&D allocation and Marketing allocation.\n\nOptions: $100K, $150K, $200K, $250K, $300K, $350K, $400K",
        type: "Linear optimization with constraints — identify binding constraints to find the optimal allocation",
        signals: "'Maximize R&D' subject to constraints. To maximize one, minimize the other. Marketing's minimum is the binding constraint.",
        trap: "Picking R&D = $300K (thinking 40% minimum somehow caps R&D) or not checking that both constraints are satisfied simultaneously.",
        method: "To maximize R&D, set Marketing at its minimum ($100K). Then R&D = $500K − $100K = $400K. Verify: $400K ≥ 40% of $500K = $200K ✓.",
        steps: ["Constraint 1: R&D ≥ 40% × $500K = $200K", "Constraint 2: Marketing ≥ $100K", "To maximize R&D, minimize Marketing → Marketing = $100K", "R&D = $500K − $100K = $400K", "Check: $400K ≥ $200K ✓ and Marketing = $100K ≥ $100K ✓", "Answer: R&D = $400K, Marketing = $100K"]
      }
    ]
  }
];

const hub = document.getElementById('hub');

topics.forEach((topic, i) => {
  const card = document.createElement('div');
  card.className = 'topic-card';
  card.id = `topic-${i}`;

  const eqItems = topic.equations.map(eq => {
    // If formula is purely $$\text{...}$$ (no real math), render as plain text to avoid KaTeX overflow
    // Only bypass KaTeX for formulas that are PURELY $$\text{plain text}$$ — no math symbols inside
    const textOnlyMatch = eq.formula.match(/^\$\$\\text\{([^\\{}]+)\}\$\$$/);
    const rendered = textOnlyMatch
      ? `<span class="eq-plain-text">${textOnlyMatch[1]}</span>`
      : eq.formula;
    return `
    <div class="eq-item">
      <div class="eq-label">${eq.label}<span class="eq-chevron">▼</span></div>
      <div class="eq-formula">${rendered}</div>
      ${eq.note ? `<div class="eq-note">${eq.note}</div>` : ''}
      ${eq.detail ? `<div class="eq-detail"><div class="eq-detail-inner">${eq.detail}</div></div>` : ''}
    </div>`;
  }).join('');

  let detailHTML = '<div class="rule-list">';
  topic.details.forEach(d => {
    if (d.type === 'title') {
      detailHTML += `<div class="section-title">${d.text}</div>`;
    } else {
      detailHTML += `<div class="rule-item">${d.text}</div>`;
    }
  });
  detailHTML += '</div>';

  const practiceHTML = topic.practice.map((p, j) => `
    <div class="practice-item" id="prac-${i}-${j}">
      <div class="practice-q" onclick="toggleAnswer(${i},${j})">
        <div class="q-num">${j+1}</div>
        <div class="q-text">${p.q}</div>
        <div class="q-toggle">▼</div>
      </div>
      <div class="practice-ans">
        <div class="ans-label">Solution</div>
        ${p.steps.map(s => `<div class="step">${s}</div>`).join('')}
      </div>
    </div>
  `).join('');

  const methodsHTML = topic.methods.map(m => `
    <div class="method-item">
      <div class="method-name">${m.name}</div>
      <div class="method-when"><em>Use when:</em> ${m.when}</div>
      <ol class="method-steps">
        ${m.steps.map(s => `<li>${s}</li>`).join('')}
      </ol>
      ${m.tip ? `<div class="method-tip">💡 ${m.tip}</div>` : ''}
    </div>
  `).join('');

  const tqHTML = topic.typicalQuestions.map((tq, j) => `
    <div class="tq-item" id="tq-${i}-${j}">
      <div class="tq-header" onclick="toggleTQ1('tq-${i}-${j}')">
        <div class="tq-type-badge">${tq.subtype}</div>
        <div class="tq-question">${tq.q}</div>
        <div class="tq-cta-1">▼ Analyze this question</div>
      </div>
      <div class="tq-layer1">
        <div class="tq-analysis">
          <div class="tq-a-row"><span class="tq-a-label">Type:</span> ${tq.type}</div>
          <div class="tq-a-row"><span class="tq-a-label">Signals:</span> ${tq.signals}</div>
          <div class="tq-a-row"><span class="tq-a-label">Trap:</span> ${tq.trap}</div>
          <div class="tq-a-row"><span class="tq-a-label">Method:</span> ${tq.method}</div>
        </div>
        <button class="tq-sol-btn" onclick="toggleTQ2(event,'tq-${i}-${j}')">Show Solution ▼</button>
        <div class="tq-layer2">
          <ol class="tq-steps">
            ${tq.steps.map(s => `<li>${s}</li>`).join('')}
          </ol>
        </div>
      </div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="card-header" onclick="toggleCard(${i})">
      <div class="card-icon">${topic.icon}</div>
      <div class="card-meta">
        <h2>${topic.title}</h2>
        <div class="preview">${topic.preview}</div>
        <div class="desc">${topic.desc}</div>
      </div>
      <div class="expand-arrow">▼</div>
    </div>
    <div class="detail-panel">
      <div class="detail-tabs">
        <button class="tab-btn active" onclick="switchTab(event,${i},'eq')">📋 Key Concepts</button>
        <button class="tab-btn" onclick="switchTab(event,${i},'detail')">📖 Rules</button>
        <button class="tab-btn" onclick="switchTab(event,${i},'methods')">🔧 Key Methods</button>
        <button class="tab-btn" onclick="switchTab(event,${i},'tq')">❓ Typical Questions</button>
        <button class="tab-btn" onclick="switchTab(event,${i},'practice')">✏️ Practice</button>
      </div>
      <div class="tab-content active" id="tab-eq-${i}">
        <div class="eq-list">${eqItems}</div>
      </div>
      <div class="tab-content" id="tab-detail-${i}">
        ${detailHTML}
      </div>
      <div class="tab-content" id="tab-methods-${i}">
        <div class="method-list">${methodsHTML}</div>
      </div>
      <div class="tab-content" id="tab-tq-${i}">
        ${topic.scenario ? `<div class="tq-scenario"><div class="tq-scenario-title">📊 Scenario Data</div>${topic.scenario}</div>` : ''}
        <div class="tq-list">${tqHTML}</div>
      </div>
      <div class="tab-content" id="tab-practice-${i}">
        <div class="practice-list">${practiceHTML}</div>
      </div>
    </div>
  `;

  hub.appendChild(card);
});

document.querySelectorAll('.eq-item').forEach(function(el) {
  el.addEventListener('click', function() { el.classList.toggle('open'); });
});

// Ref-term tooltip toggle (tap to show, tap elsewhere to hide)
document.addEventListener('click', function(e) {
  const term = e.target.closest('.ref-term');
  document.querySelectorAll('.ref-term.tip-active').forEach(function(el) {
    if (el !== term) el.classList.remove('tip-active');
  });
  if (term) {
    e.stopPropagation();
    term.classList.toggle('tip-active');
  }
});

function toggleCard(i) {
  const card = document.getElementById(`topic-${i}`);
  card.classList.toggle('active');
  if (card.classList.contains('active')) {
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function switchTab(e, i, tab) {
  e.stopPropagation();
  const card = document.getElementById(`topic-${i}`);
  card.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  card.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById(`tab-${tab}-${i}`).classList.add('active');
}

function toggleTQ1(id) {
  const item = document.getElementById(id);
  item.classList.toggle('tq-open1');
  if (!item.classList.contains('tq-open1')) item.classList.remove('tq-open2');
}
function toggleTQ2(e, id) {
  e.stopPropagation();
  const item = document.getElementById(id);
  item.classList.toggle('tq-open2');
  const btn = item.querySelector('.tq-sol-btn');
  btn.textContent = item.classList.contains('tq-open2') ? 'Hide Solution ▲' : 'Show Solution ▼';
}

function toggleAnswer(i, j) {
  document.getElementById(`prac-${i}-${j}`).classList.toggle('show-ans');
}
</script>
<script>
(function buildDesktopSidebar() {
  if (window.innerWidth < 1024) return;
  var path = window.location.pathname;
  var isIndex = path === '/' || path.endsWith('index.html') || path === '';
  var isVerbal = path.endsWith('verbal.html');
  var isDI = path.endsWith('di.html');
  var isLog = path.endsWith('log.html');
  function navItem(href, icon, label, active) {
    return '<a href="'+href+'" class="dt-nav-item'+(active?' dt-active':'')+'"><span class="dt-nav-icon">'+icon+'</span>'+label+'</a>';
  }
  var cards = document.querySelectorAll('.topic-card');
  var topicHTML = '';
  if (cards.length) {
    topicHTML = '<div class="dt-topics-label">Topics</div>';
    cards.forEach(function(card, i) {
      var title = (card.querySelector('h2') || card.querySelector('h3') || card.querySelector('.card-title') || {}).textContent || 'Topic '+(i+1);
      topicHTML += '<button class="dt-topic-link" data-card-idx="'+i+'" onclick="dtScrollToCard('+i+')">'+title+'</button>';
    });
  }
  var sidebar = document.createElement('aside');
  sidebar.className = 'dt-sidebar';
  sidebar.id = 'dt-sidebar';
  sidebar.innerHTML =
    '<div class="dt-logo"><span class="dt-logo-icon">\uD83C\uDF93</span><span class="dt-logo-text">GMAT Hub</span></div>' +
    '<nav class="dt-nav"><div class="dt-nav-label">Sections</div>' +
    navItem('index.html','\uD83D\uDCD0','Math',isIndex) +
    navItem('verbal.html','\uD83D\uDCAC','Verbal',isVerbal) +
    navItem('di.html','\uD83D\uDCCA','Data Insights',isDI) +
    navItem('log.html','\uD83D\uDCCB','Question Log',isLog) +
    '</nav>' +
    '<div class="dt-topics" id="dt-topics">'+topicHTML+'</div>' +
    '<div class="dt-sidebar-footer"><button class="dt-footer-btn" onclick="if(document.querySelector(\'.fab\'))document.querySelector(\'.fab\').click()">\uD83D\uDD0D Analyzer</button></div>';
  document.body.insertBefore(sidebar, document.body.firstChild);
  var wrap = document.createElement('div');
  wrap.className = 'dt-main-wrap';
  while (sidebar.nextSibling) wrap.appendChild(sidebar.nextSibling);
  document.body.appendChild(wrap);
})();
function dtScrollToCard(idx) {
  var cards = document.querySelectorAll('.topic-card');
  var card = cards[idx];
  if (!card) return;
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  if (!card.classList.contains('active')) {
    var header = card.querySelector('.card-header');
    if (header) header.click();
  }
  document.querySelectorAll('.dt-topic-link').forEach(function(el, i) {
    el.classList.toggle('dt-topic-active', i === idx);
  });
}
</script>

</body>
