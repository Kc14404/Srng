<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMAT Focus — Equation Guide</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left:'$$',right:'$$',display:true},
        {left:'\\(',right:'\\)',display:false}
      ],
      throwOnError: false
    })">
  </script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #22263a;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --text: #e8eaf0;
      --muted: #8b90a7;
      --border: #2e3248;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 32px 24px 28px;
      text-align: center;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--muted); margin-top: 8px; font-size: 0.95rem; }

    .hub {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .topic-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
      min-width: 0;
    }
    .topic-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 8px 30px rgba(108,99,255,0.15); }
    .topic-card.active { border-color: var(--accent2); }

    .card-header {
      padding: 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .card-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface);
      border-radius: 10px;
    }
    .card-meta h2 { font-size: 1rem; font-weight: 600; }
    .card-meta .preview {
      font-size: 0.82rem;
      color: var(--accent2);
      margin-top: 4px;
    }
    .card-meta .desc { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
    .expand-arrow { margin-left: auto; font-size: 0.75rem; color: var(--muted); transition: transform 0.3s; align-self: center; flex-shrink: 0; }
    .topic-card.active .expand-arrow { transform: rotate(180deg); }

    .detail-panel { display: none; background: var(--surface); border-top: 1px solid var(--border); }
    .topic-card.active .detail-panel { display: block; }

    .detail-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab-btn {
      padding: 10px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }

    .tab-content { display: none; padding: 20px; min-width: 0; overflow: hidden; }
    .tab-content.active { display: block; }

    /* Equations */
    .eq-list { display: flex; flex-direction: column; gap: 10px; }
    .eq-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }
    .eq-item .eq-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .eq-item .eq-note { font-size: 0.78rem; color: var(--muted); margin-top: 8px; word-break: break-word; }
    .eq-formula { overflow-x: hidden; max-width: 100%; }
    .eq-formula .katex, .eq-formula .katex-html { white-space: normal !important; }
    .eq-plain-text { color: var(--accent2); font-size: 0.95rem; line-height: 1.6; display: block; word-break: break-word; }
    .eq-chevron { float: right; font-size: 0.7rem; color: var(--muted); transition: transform 0.25s; line-height: 1.8; }
    .eq-item.open .eq-chevron { transform: rotate(180deg); }
    .eq-item .eq-detail { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .eq-item.open .eq-detail { max-height: 500px; }
    .eq-detail-inner { padding-top: 10px; margin-top: 8px; border-top: 1px solid var(--border); font-size: 0.82rem; color: #9aa3b8; line-height: 1.65; }

    /* Details */
    .rule-list { display: flex; flex-direction: column; gap: 10px; }
    .rule-item {
      background: var(--card);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 12px 14px;
      font-size: 0.84rem;
      line-height: 1.6;
      overflow-x: auto;
      min-width: 0;
    }
    .rule-item strong { color: var(--accent2); }
    .rule-item code {
      font-family: 'Courier New', monospace;
      background: rgba(108,99,255,0.12);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.88em;
      color: #a78bfa;
    }

    .section-title {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin: 16px 0 6px;
      font-weight: 700;
    }
    .section-title:first-child { margin-top: 0; }

    /* Practice */
    .practice-list { display: flex; flex-direction: column; gap: 14px; }
    .practice-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .practice-q {
      padding: 14px 16px;
      font-size: 0.85rem;
      line-height: 1.6;
      cursor: pointer;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      transition: background 0.15s;
    }
    .practice-q:hover { background: rgba(108,99,255,0.05); }
    .q-num {
      flex-shrink: 0;
      width: 22px; height: 22px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      margin-top: 1px;
    }
    .q-text { flex: 1; }
    .q-toggle { flex-shrink: 0; color: var(--muted); font-size: 0.7rem; transition: transform 0.2s; }
    .practice-item.show-ans .q-toggle { transform: rotate(180deg); }

    .practice-ans {
      display: none;
      padding: 12px 16px 14px 48px;
      border-top: 1px solid var(--border);
      font-size: 0.83rem;
      line-height: 1.6;
      color: var(--muted);
      background: rgba(0,212,170,0.04);
    }
    .practice-item.show-ans .practice-ans { display: block; }
    .practice-ans .ans-label { font-size: 0.68rem; color: var(--accent2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .practice-ans .step { margin-bottom: 4px; }

    /* KaTeX overrides */
    .katex { color: var(--accent2); }
    .eq-item .katex { font-size: 1.05rem; }
    .practice-q .katex, .practice-ans .katex { font-size: 0.9rem; color: #a78bfa; }
    .rule-item .katex { font-size: 0.88rem; color: #a78bfa; }

    /* Prevent KaTeX display math from overflowing */
    .katex-display {
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100%;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .katex-display > .katex { max-width: none; }

    /* Global overflow safety */
    .eq-item, .rule-item, .practice-q, .practice-ans, .hint-body {
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .result-badges { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
    @media (max-width: 480px) {
      .result-badges { flex-wrap: wrap; }
      .eq-item .katex { font-size: 0.95rem; }
    }

    /* Analyzer FAB */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1.4rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(108,99,255,0.4);
      z-index: 100;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .fab:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(108,99,255,0.5); }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-size: 1rem; font-weight: 700; }
    .modal-header p { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 4px; }
    .modal-close:hover { color: var(--text); }

    .modal-body { padding: 20px 24px; }

    .input-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .input-tab {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .input-tab.active { background: var(--accent); border-color: var(--accent); color: white; }

    .input-panel { display: none; }
    .input-panel.active { display: block; }

    .q-textarea {
      width: 100%;
      min-height: 120px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .q-textarea:focus { border-color: var(--accent); }
    .q-textarea::placeholder { color: var(--muted); }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover { border-color: var(--accent); background: rgba(108,99,255,0.04); }
    .upload-zone.has-image { border-color: var(--accent2); border-style: solid; }
    .upload-zone .upload-icon { font-size: 2rem; margin-bottom: 8px; }
    .upload-zone p { color: var(--muted); font-size: 0.84rem; }
    .upload-zone .img-preview { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 10px; }
    #imageInput { display: none; }

    .analyze-btn {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .analyze-btn:hover { opacity: 0.9; }
    .analyze-btn:active { transform: scale(0.98); }
    .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Results */
    .result-area { margin-top: 20px; }
    .result-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .badge {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .badge-section-quant { background: rgba(108,99,255,0.2); border: 1px solid rgba(108,99,255,0.4); color: #a78bfa; }
    .badge-section-verbal { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .badge-section-data { background: rgba(251,146,60,0.15); border: 1px solid rgba(251,146,60,0.3); color: #fb923c; }
    .badge-topic { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--text); }
    .badge-type { background: rgba(0,212,170,0.15); border: 1px solid rgba(0,212,170,0.3); color: var(--accent2); }

    .hints-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); font-weight: 700; margin-bottom: 10px; }
    .hint-cards { display: flex; flex-direction: column; gap: 8px; }
    .hint-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .hint-header {
      padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .hint-header:hover { background: rgba(255,255,255,0.03); }
    .hint-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .hint-num.h1 { background: rgba(250,204,21,0.2); color: #fbbf24; border: 1px solid rgba(250,204,21,0.3); }
    .hint-num.h2 { background: rgba(251,146,60,0.2); color: #fb923c; border: 1px solid rgba(251,146,60,0.3); }
    .hint-num.h3 { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .hint-label { font-size: 0.8rem; color: var(--muted); flex: 1; }
    .hint-arrow { font-size: 0.7rem; color: var(--muted); transition: transform 0.2s; }
    .hint-card.revealed .hint-arrow { transform: rotate(180deg); }
    .hint-body {
      display: none;
      padding: 0 16px 14px 50px;
      font-size: 0.84rem;
      line-height: 1.6;
      color: var(--text);
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .hint-card.revealed .hint-body { display: block; }

    .badge-diff-easy { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .badge-diff-medium { background: rgba(251,146,60,0.15); border: 1px solid rgba(251,146,60,0.3); color: #fb923c; }
    .badge-diff-hard { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }

    .error-msg { color: #f87171; font-size: 0.84rem; margin-top: 12px; text-align: center; }
    .loading-dots { text-align: center; padding: 20px; color: var(--muted); font-size: 0.9rem; }

    /* Nav bar */
    .site-nav {
      background: #1a1d27;
      border-bottom: 1px solid #2e3248;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
    }
    .nav-brand {
      font-weight: 800;
      font-size: 0.9rem;
      color: #6c63ff;
      padding: 14px 20px 14px 0;
      text-decoration: none;
      flex-shrink: 0;
      border-right: 1px solid #2e3248;
      margin-right: 8px;
    }
    .nav-link {
      padding: 14px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #8b90a7;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .nav-link:hover { color: #e8eaf0; }
    .nav-link.active { color: #00d4aa; border-bottom-color: #00d4aa; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 100px;
      right: 28px;
      background: rgba(0,212,170,0.15);
      border: 1px solid rgba(0,212,170,0.3);
      color: #00d4aa;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.84rem;
      font-weight: 600;
      z-index: 300;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .hub { grid-template-columns: 1fr; }
      .fab { bottom: 20px; right: 20px; }
    }
    .ref-term {
      color: #a78bfa;
      border-bottom: 1px dashed #a78bfa;
      cursor: pointer;
      position: relative;
      white-space: nowrap;
    }
    .ref-tip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e2130;
      border: 1px solid #3a3d50;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.78rem;
      color: #b0b8cc;
      line-height: 1.5;
      width: 230px;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      pointer-events: none;
    }
    .ref-term.tip-active .ref-tip { display: block; }

    .method-list { display: flex; flex-direction: column; gap: 14px; }
    .method-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .method-name { font-size: 0.95rem; font-weight: 600; color: var(--accent2); margin-bottom: 6px; }
    .method-when { font-size: 0.82rem; color: var(--muted); margin-bottom: 8px; }
    .method-steps { margin: 8px 0 8px 16px; font-size: 0.84rem; line-height: 1.7; color: #c8d0e0; }
    .method-steps li { margin-bottom: 4px; }
    .method-tip { font-size: 0.8rem; color: #a78bfa; font-style: italic; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

    .tq-list { display: flex; flex-direction: column; gap: 14px; }
    .tq-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .tq-header { padding: 16px; cursor: pointer; transition: background 0.15s; }
    .tq-header:hover { background: rgba(108,99,255,0.07); }
    .tq-type-badge { display: inline-block; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; background: rgba(108,99,255,0.18); color: #a78bfa; border-radius: 4px; padding: 2px 8px; margin-bottom: 10px; }
    .tq-question { font-size: 0.86rem; color: #dde2f0; line-height: 1.7; white-space: pre-line; }
    .tq-cta-1 { font-size: 0.74rem; color: var(--muted); margin-top: 10px; transition: color 0.15s; }
    .tq-item.tq-open1 .tq-cta-1 { color: var(--accent2); }
    .tq-layer1 { display: none; border-top: 1px solid var(--border); padding: 14px 16px; background: rgba(0,0,0,0.18); }
    .tq-item.tq-open1 .tq-layer1 { display: block; }
    .tq-analysis { margin-bottom: 14px; }
    .tq-a-row { font-size: 0.83rem; line-height: 1.6; color: #b8c0d4; margin-bottom: 6px; }
    .tq-a-label { font-weight: 600; color: #e0e4f0; margin-right: 4px; }
    .tq-sol-btn { background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.35); color: #a78bfa; border-radius: 6px; padding: 7px 14px; font-size: 0.8rem; font-weight: 600; cursor: pointer; width: 100%; text-align: center; transition: background 0.15s; margin-bottom: 0; }
    .tq-sol-btn:hover { background: rgba(108,99,255,0.25); }
    .tq-layer2 { display: none; padding-top: 14px; border-top: 1px solid var(--border); margin-top: 12px; }
    .tq-item.tq-open2 .tq-layer2 { display: block; }
    .tq-steps { margin: 0 0 0 16px; font-size: 0.84rem; line-height: 1.75; color: #c0c8dc; }
    .tq-steps li { margin-bottom: 6px; }
    .tq-steps li:last-child { color: #7dd3a8; font-weight: 600; }

    /* ── Desktop 3-Pane Layout (≥1024px) ── */
    @media (min-width: 1024px) {
      .site-nav { display: none; }
      .fab { display: none; }
      .dt-wrap { display: flex; min-height: 100vh; }
      #dt-rail { width: 240px; min-width: 240px; background: #1a1a2e; border-right: 1px solid #2a2a3e; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
      .dt-rail-section { padding: 16px; border-bottom: 1px solid #2a2a3e; }
      .dt-rail-logo { font-size: 0.85rem; font-weight: 700; color: #a78bfa; letter-spacing: 0.05em; }
      .dt-rail-nav { display: flex; flex-direction: column; gap: 2px; margin-top: 8px; }
      .dt-rail-link { padding: 7px 10px; border-radius: 6px; color: #9ca3af; font-size: 0.82rem; text-decoration: none; display: flex; align-items: center; gap: 8px; }
      .dt-rail-link:hover, .dt-rail-link.active { background: #2a2a3e; color: #e2e8f0; }

      .dt-topics-section { padding: 8px 0; flex: 1; overflow-y: auto; }

      .dt-topic-item { padding: 8px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; color: #9ca3af; font-size: 0.82rem; border-left: 2px solid transparent; }
      .dt-topic-item:hover { background: #1e1e35; color: #e2e8f0; }
      .dt-topic-item.active { background: #1e1e35; color: #a78bfa; border-left-color: #a78bfa; }

      .dt-rail-footer { padding: 12px 16px; border-top: 1px solid #2a2a3e; }
      .dt-footer-btn { width: 100%; padding: 9px; background: rgba(108,99,255,0.12); border: 1px solid rgba(108,99,255,0.3); border-radius: 8px; color: #a78bfa; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
      .dt-footer-btn:hover { background: rgba(108,99,255,0.22); }
      .dt-content { flex: 1; min-width: 0; padding: 32px 40px; overflow-y: auto; }
      #dt-overview { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
      .dt-overview-card { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 12px; padding: 20px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
      .dt-overview-card:hover { border-color: #a78bfa; background: #1e1e35; }
      .dt-overview-icon { font-size: 1.8rem; margin-bottom: 8px; }

      .dt-overview-sub { font-size: 0.78rem; color: #6b7280; line-height: 1.4; }
      #dt-breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }

      header { text-align: left; padding: 0 0 24px; border: none; background: none; }
    }
  </style>
  <script src="/js/loader.js"></script>

<body>

<nav class="site-nav">
  <a class="nav-brand" href="index.html">GMAT Hub</a>
  <a class="nav-link active" href="index.html">📐 Math</a>
  <a class="nav-link" href="verbal.html">📖 Verbal</a>
  <a class="nav-link" href="di.html">📊 Data Insights</a>
  <a class="nav-link" href="log.html">📋 Log</a>
</nav>

<header>
  <h1>GMAT Focus — Equation Guide</h1>
  <p>Click any topic to explore equations, rules, and practice problems.</p>
</header>

<div class="hub topics-grid" id="hub"></div>

<!-- FAB -->
<button class="fab" onclick="openAnalyzer()" title="Analyze a question">🔍</button>

<!-- Analyzer Modal -->
<div class="modal-overlay" id="analyzerModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h3>🧠 Question Analyzer</h3>
        <p>Quant · Verbal · Data Insights — paste or screenshot any GMAT question for hints.</p>
      </div>
      <button class="modal-close" onclick="closeAnalyzer()">✕</button>
    </div>
    <div class="modal-body">
      <div class="input-tabs">
        <button class="input-tab active" onclick="switchInput('text')">📝 Paste Text</button>
        <button class="input-tab" onclick="switchInput('image')">📸 Screenshot</button>
      </div>

      <div class="input-panel active" id="panel-text">
        <textarea class="q-textarea" id="questionText" placeholder="Paste your GMAT question here…"></textarea>
      </div>

      <div class="input-panel" id="panel-image">
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('imageInput').click()">
          <div class="upload-icon">📷</div>
          <p>Click to upload or drag & drop a screenshot</p>
          <img id="imgPreview" class="img-preview" style="display:none" />
        </div>
        <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)" />
      </div>

      <button class="analyze-btn" id="analyzeBtn" onclick="analyzeQuestion()">Analyze Question →</button>

      <div class="result-area" id="resultArea" style="display:none"></div>
    </div>
  </div>
</div>

<script>
// Data now loaded from database via /api/topics
window.renderTopics = function(topics) {
const hub = document.getElementById('hub');
hub.innerHTML = '';

topics.forEach((topic, i) => {
  const card = document.createElement('div');
  card.className = 'topic-card';
  card.id = `topic-${i}`;

  const eqItems = (topic.equations || []).map(eq => {
    const textOnlyMatch = eq.formula ? eq.formula.match(/^\$\$\\text\{([^\\{}]+)\}\$\$$/) : null;
    const rendered = textOnlyMatch
      ? `<span class="eq-plain-text">${textOnlyMatch[1]}</span>`
      : (eq.formula || '');
    return `
    <div class="eq-item">
      <div class="eq-label">${eq.label}<span class="eq-chevron">▼</span></div>
      <div class="eq-formula">${rendered}</div>
      ${eq.note ? `<div class="eq-note">${eq.note}</div>` : ''}
      ${eq.detail ? `<div class="eq-detail"><div class="eq-detail-inner">${eq.detail}</div></div>` : ''}
    </div>`;
  }).join('');

  let detailHTML = '<div class="rule-list">';
  const details = topic.details || topic.rules || [];
  details.forEach(d => {
    if (d.type === 'title' || d.title) {
      detailHTML += `<div class="section-title">${d.text || d.title || ''}</div>`;
    } else {
      detailHTML += `<div class="rule-item">${d.text || d.content || ''}</div>`;
    }
  });
  detailHTML += '</div>';

  const practiceHTML = (topic.practice || []).map((p, j) => `
    <div class="practice-item" id="prac-${i}-${j}">
      <div class="practice-q" onclick="toggleAnswer(${i},${j})">
        <div class="q-num">${j+1}</div>
        <div class="q-text">${p.q || p.question || ''}</div>
        <div class="q-toggle">▼</div>
      </div>
      <div class="practice-ans">
        <div class="ans-label">Solution</div>
        ${p.steps ? p.steps.map(s => `<div class="step">${s}</div>`).join('') : (p.a ? `<div class="step">${p.a}</div>` : '')}
      </div>
    </div>
  `).join('');

  const methodsHTML = (topic.methods || []).map(m => `
    <div class="method-item">
      <div class="method-name">${m.name}</div>
      <div class="method-when"><em>Use when:</em> ${m.when || m.when_to_use || ''}</div>
      <ol class="method-steps">
        ${(m.steps || []).map(s => `<li>${s}</li>`).join('')}
      </ol>
      ${m.tip ? `<div class="method-tip">💡 ${m.tip}</div>` : ''}
    </div>
  `).join('');

  const tqHTML = (topic.typicalQuestions || []).map((tq, j) => `
    <div class="tq-item" id="tq-${i}-${j}">
      <div class="tq-header" onclick="toggleTQ1('tq-${i}-${j}')">
        <div class="tq-type-badge">${tq.subtype}</div>
        <div class="tq-question">${tq.q}</div>
        <div class="tq-cta-1">▼ Analyze this question</div>
      </div>
      <div class="tq-layer1">
        <div class="tq-analysis">
          <div class="tq-a-row"><span class="tq-a-label">Type:</span> ${tq.type}</div>
          <div class="tq-a-row"><span class="tq-a-label">Signals:</span> ${tq.signals}</div>
          <div class="tq-a-row"><span class="tq-a-label">Trap:</span> ${tq.trap}</div>
          <div class="tq-a-row"><span class="tq-a-label">Method:</span> ${tq.method}</div>
        </div>
        <button class="tq-sol-btn" onclick="toggleTQ2(event,'tq-${i}-${j}')">Show Solution ▼</button>
        <div class="tq-layer2">
          <ol class="tq-steps">
            ${(tq.steps || []).map(s => `<li>${s}</li>`).join('')}
          </ol>
        </div>
      </div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="card-header" onclick="toggleCard(${i})">
      <div class="card-icon">${topic.icon || ''}</div>
      <div class="card-meta">
        <h2>${topic.title}</h2>
        <div class="preview">${topic.preview || topic.subtitle || ''}</div>
        <div class="desc">${topic.desc || ''}</div>
      </div>
      <div class="expand-arrow">▼</div>
    </div>
    <div class="detail-panel">
      <div class="detail-tabs">
        <button class="tab-btn active" onclick="switchTab(event,${i},'eq')">📐 Equations</button>
        <button class="tab-btn" onclick="switchTab(event,${i},'detail')">📖 Rules</button>
        <button class="tab-btn" onclick="switchTab(event,${i},'methods')">🔧 Key Methods</button>
        <button class="tab-btn" onclick="switchTab(event,${i},'tq')">❓ Typical Questions</button>
        <button class="tab-btn" onclick="switchTab(event,${i},'practice')">✏️ Practice</button>
      </div>
      <div class="tab-content active" id="tab-eq-${i}">
        <div class="eq-list">${eqItems}</div>
      </div>
      <div class="tab-content" id="tab-detail-${i}">
        ${detailHTML}
      </div>
      <div class="tab-content" id="tab-methods-${i}">
        <div class="method-list">${methodsHTML}</div>
      </div>
      <div class="tab-content" id="tab-tq-${i}">
        <div class="tq-list">${tqHTML}</div>
      </div>
      <div class="tab-content" id="tab-practice-${i}">
        <div class="practice-list">${practiceHTML}</div>
      </div>
    </div>
  `;

  hub.appendChild(card);
});

document.querySelectorAll('.eq-item').forEach(function(el) {
  el.addEventListener('click', function() { el.classList.toggle('open'); });
});

// KaTeX re-render after dynamic content
if (window.renderMathInElement) {
  renderMathInElement(hub, {
    delimiters: [
      {left:'$$',right:'$$',display:true},
      {left:'\\(',right:'\\)',display:false}
    ],
    throwOnError: false
  });
}

// Desktop 3-pane layout
window._dtTopics = topics;
initDesktopLayout();
};

// Ref-term tooltip toggle (tap to show, tap elsewhere to hide)
document.addEventListener('click', function(e) {
  const term = e.target.closest('.ref-term');
  document.querySelectorAll('.ref-term.tip-active').forEach(function(el) {
    if (el !== term) el.classList.remove('tip-active');
  });
  if (term) {
    e.stopPropagation();
    term.classList.toggle('tip-active');
  }
});

function toggleCard(i) {
  if (window.innerWidth >= 1024) return;
  const card = document.getElementById(`topic-${i}`);
  card.classList.toggle('active');
  if (card.classList.contains('active')) {
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function switchTab(e, i, tab) {
  e.stopPropagation();
  const card = document.getElementById(`topic-${i}`);
  card.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  card.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById(`tab-${tab}-${i}`).classList.add('active');
}

function toggleTQ1(id) {
  const item = document.getElementById(id);
  item.classList.toggle('tq-open1');
  if (!item.classList.contains('tq-open1')) item.classList.remove('tq-open2');
}
function toggleTQ2(e, id) {
  e.stopPropagation();
  const item = document.getElementById(id);
  item.classList.toggle('tq-open2');
  const btn = item.querySelector('.tq-sol-btn');
  btn.textContent = item.classList.contains('tq-open2') ? 'Hide Solution ▲' : 'Show Solution ▼';
}

function toggleAnswer(i, j) {
  document.getElementById(`prac-${i}-${j}`).classList.toggle('show-ans');
}

// ── Analyzer ──────────────────────────────────────────────
let currentInputMode = 'text';
let uploadedImageData = null;
let uploadedMimeType = null;

function openAnalyzer() {
  document.getElementById('analyzerModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeAnalyzer() {
  document.getElementById('analyzerModal').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('analyzerModal').addEventListener('click', function(e) {
  if (e.target === this) closeAnalyzer();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeAnalyzer();
});

function switchInput(mode) {
  currentInputMode = mode;
  document.querySelectorAll('.input-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.input-panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(`panel-${mode}`).classList.add('active');
  document.getElementById('resultArea').style.display = 'none';
}

function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const result = ev.target.result;
    const base64 = result.split(',')[1];
    uploadedImageData = base64;
    uploadedMimeType = result.split(';')[0].split(':')[1] || file.type;
    const preview = document.getElementById('imgPreview');
    preview.src = result;
    preview.style.display = 'block';
    const zone = document.getElementById('uploadZone');
    zone.classList.add('has-image');
    zone.querySelector('p').textContent = file.name;
  };
  reader.readAsDataURL(file);
}

// Drag & drop
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.style.borderColor = 'var(--accent2)'; });
uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor = ''; });
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.style.borderColor = '';
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const dt = new DataTransfer();
    dt.items.add(file);
    document.getElementById('imageInput').files = dt.files;
    handleImageUpload({ target: { files: [file] } });
  }
});

async function analyzeQuestion() {
  const btn = document.getElementById('analyzeBtn');
  const resultArea = document.getElementById('resultArea');

  let payload = {};
  if (currentInputMode === 'text') {
    const text = document.getElementById('questionText').value.trim();
    if (!text) { alert('Please paste a question first.'); return; }
    payload = { text };
  } else {
    if (!uploadedImageData) { alert('Please upload a screenshot first.'); return; }
    payload = { image: { data: uploadedImageData, mimeType: uploadedMimeType } };
  }

  btn.disabled = true;
  btn.textContent = 'Analyzing…';
  resultArea.style.display = 'block';
  resultArea.innerHTML = '<div class="loading-dots">🤔 Analyzing your question…</div>';

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (!res.ok || data.error) throw new Error(data.error || 'Something went wrong');

    const hintLabels = ['Gentle nudge', 'Point in the right direction', 'First concrete step'];
    const hintClasses = ['h1', 'h2', 'h3'];

    const sectionEmoji = { 'Quantitative Reasoning': '🔢', 'Verbal Reasoning': '📖', 'Data Insights': '📊' };
    const sectionClass = { 'Quantitative Reasoning': 'badge-section-quant', 'Verbal Reasoning': 'badge-section-verbal', 'Data Insights': 'badge-section-data' };
    const secEmoji = sectionEmoji[data.section] || '📚';
    const secClass = sectionClass[data.section] || 'badge-section-quant';

    const diffClass = { 'Easy': 'badge-diff-easy', 'Medium': 'badge-diff-medium', 'Hard': 'badge-diff-hard' };
    const dClass = diffClass[data.difficulty] || 'badge-diff-medium';

    resultArea.innerHTML = `
      <div class="result-badges">
        <span class="badge ${secClass}">${secEmoji} ${data.section}</span>
        <span class="badge badge-topic">📌 ${data.topic}</span>
        <span class="badge badge-type">🏷 ${data.questionType}</span>
        <span class="badge ${dClass}">${data.difficulty || 'Medium'}</span>
      </div>
      <div class="hints-title">Progressive Hints — reveal when you're ready</div>
      <div class="hint-cards">
        ${data.hints.map((hint, i) => `
          <div class="hint-card" id="hint-${i}">
            <div class="hint-header" onclick="revealHint(${i})">
              <div class="hint-num ${hintClasses[i]}">${i+1}</div>
              <div class="hint-label">${hintLabels[i]}</div>
              <div class="hint-arrow">▼</div>
            </div>
            <div class="hint-body">${hint}</div>
          </div>
        `).join('')}
      </div>
    `;

    // Re-render math in result
    if (window.renderMathInElement) {
      renderMathInElement(resultArea, {
        delimiters: [
          {left:'$$',right:'$$',display:true},
          {left:'\\(',right:'\\)',display:false}
        ],
        throwOnError: false
      });
    }

    // Auto-save to log
    const logEntry = {
      id: Date.now().toString(),
      date: new Date().toISOString(),
      questionText: currentInputMode === 'image' ? '[Image question]' : document.getElementById('questionText').value.trim(),
      section: data.section,
      topic: data.topic,
      questionType: data.questionType,
      difficulty: data.difficulty || 'Medium',
      hints: data.hints,
      bookmarked: false
    };
    const log = JSON.parse(localStorage.getItem('gmat_log') || '[]');
    log.push(logEntry);
    localStorage.setItem('gmat_log', JSON.stringify(log));

    // Toast
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = 'Saved to log ✓';
    document.body.appendChild(toast);
    requestAnimationFrame(() => { toast.classList.add('show'); });
    setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 2000);
  } catch (err) {
    resultArea.innerHTML = `<div class="error-msg">❌ ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Analyze Question →';
  }
}

function revealHint(i) {
  document.getElementById(`hint-${i}`).classList.toggle('revealed');
}

// Data load
document.addEventListener('DOMContentLoaded', function() {
  window.initPage('math');
});
</script>
<script>
function buildRailHTML(topics) {
  var path = window.location.pathname;
  var isIndex = path === '/' || path.endsWith('index.html') || path === '';
  var isVerbal = path.endsWith('verbal.html');
  var isDI = path.endsWith('di.html');
  var isLog = path.endsWith('log.html');
  var html = '<div class="dt-rail-section">';
  html += '<div class="dt-rail-logo">\uD83C\uDF93 GMAT Hub</div>';
  html += '<div class="dt-rail-nav">';
  html += '<a href="index.html" class="dt-rail-link'+(isIndex?' active':'')+'"><span>\uD83D\uDCD0</span> Math</a>';
  html += '<a href="verbal.html" class="dt-rail-link'+(isVerbal?' active':'')+'"><span>\uD83D\uDCAC</span> Verbal</a>';
  html += '<a href="di.html" class="dt-rail-link'+(isDI?' active':'')+'"><span>\uD83D\uDCCA</span> Data Insights</a>';
  html += '<a href="log.html" class="dt-rail-link'+(isLog?' active':'')+'"><span>\uD83D\uDCD3</span> Log</a>';
  html += '</div></div>';
  html += '<div class="dt-topics-section"><div class="dt-topics-label">Topics</div>';
  topics.forEach(function(t, i) {
    html += '<div class="dt-topic-item" data-idx="'+i+'"><span class="dt-topic-icon">'+(t.icon||'')+'</span><span>'+t.title+'</span></div>';
  });
  html += '</div>';
  html += '<div class="dt-rail-footer"><button id="dt-rail-analyzer" class="dt-footer-btn">\uD83D\uDD0D Analyzer</button></div>';
  return html;
}
function dtShowOverview() {
  if (!window._dtTopics) return;
  var topics = window._dtTopics;
  var hub = document.getElementById('hub');
  var overview = document.getElementById('dt-overview');
  var breadcrumb = document.getElementById('dt-breadcrumb');
  if (!overview) {
    overview = document.createElement('div');
    overview.id = 'dt-overview';
    hub.parentNode.insertBefore(overview, hub);
  }
  if (!breadcrumb) {
    breadcrumb = document.createElement('div');
    breadcrumb.id = 'dt-breadcrumb';
    breadcrumb.innerHTML = '<button id="dt-back-btn" onclick="dtShowOverview()">\u2190 All Topics</button>';
    hub.parentNode.insertBefore(breadcrumb, overview);
  }
  overview.innerHTML = topics.map(function(t, i) {
    return '<div class="dt-overview-card" onclick="dtSelectTopic('+i+')"><div class="dt-overview-icon">'+(t.icon||'')+'</div><div class="dt-overview-title">'+t.title+'</div><div class="dt-overview-sub">'+(t.preview||t.subtitle||t.desc||'')+'</div></div>';
  }).join('');
  overview.style.display = '';
  breadcrumb.style.display = 'none';
  hub.style.display = 'none';
  document.querySelectorAll('.dt-topic-item').forEach(function(el) { el.classList.remove('active'); });
}
function dtSelectTopic(i) {
  if (window.innerWidth < 1024) return;
  var hub = document.getElementById('hub');
  var overview = document.getElementById('dt-overview');
  var breadcrumb = document.getElementById('dt-breadcrumb');
  if (overview) overview.style.display = 'none';
  if (breadcrumb) breadcrumb.style.display = '';
  hub.style.display = 'block';
  var cards = hub.querySelectorAll('.topic-card');
  cards.forEach(function(card, idx) {
    if (idx === i) { card.style.display = ''; card.classList.add('active'); }
    else { card.style.display = 'none'; }
  });
  document.querySelectorAll('.dt-topic-item').forEach(function(el, idx) { el.classList.toggle('active', idx === i); });
  var content = document.querySelector('.dt-content');
  if (content) content.scrollTo(0, 0);
}
function initDesktopLayout() {
  if (window.innerWidth < 1024) return;
  var hub = document.getElementById('hub');
  if (!hub || !window._dtTopics) return;
  var existing = document.querySelector('.dt-wrap');
  if (existing) return;
  var topics = window._dtTopics;
  var wrap = document.createElement('div');
  wrap.className = 'dt-wrap';
  var rail = document.createElement('div');
  rail.id = 'dt-rail';
  rail.innerHTML = buildRailHTML(topics);
  var content = document.createElement('div');
  content.className = 'dt-content';
  var header = document.querySelector('header');
  hub.parentNode.insertBefore(wrap, header || hub);
  wrap.appendChild(rail);
  if (header) content.appendChild(header);
  content.appendChild(hub);
  wrap.appendChild(content);
  dtShowOverview();
  rail.querySelectorAll('.dt-topic-item').forEach(function(item, i) {
    item.addEventListener('click', function() { dtSelectTopic(i); });
  });
  var analyzerBtn = rail.querySelector('#dt-rail-analyzer');
  if (analyzerBtn) {
    analyzerBtn.addEventListener('click', function() {
      var fab = document.querySelector('.fab');
      if (fab) fab.click();
      else if (typeof openAnalyzer === 'function') openAnalyzer();
    });
  }
}
</script>
</body>
</html>
