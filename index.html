<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMAT Focus — Equation Guide</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left:'$$',right:'$$',display:true},
        {left:'\\(',right:'\\)',display:false}
      ],
      throwOnError: false
    })">
  </script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #22263a;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --text: #e8eaf0;
      --muted: #8b90a7;
      --border: #2e3248;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 32px 24px 28px;
      text-align: center;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--muted); margin-top: 8px; font-size: 0.95rem; }

    .hub {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .topic-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
      min-width: 0;
    }
    .topic-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 8px 30px rgba(108,99,255,0.15); }
    .topic-card.active { border-color: var(--accent2); }

    .card-header {
      padding: 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .card-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface);
      border-radius: 10px;
    }
    .card-meta h2 { font-size: 1rem; font-weight: 600; }
    .card-meta .preview {
      font-size: 0.82rem;
      color: var(--accent2);
      margin-top: 4px;
    }
    .card-meta .desc { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
    .expand-arrow { margin-left: auto; font-size: 0.75rem; color: var(--muted); transition: transform 0.3s; align-self: center; flex-shrink: 0; }
    .topic-card.active .expand-arrow { transform: rotate(180deg); }

    .detail-panel { display: none; background: var(--surface); border-top: 1px solid var(--border); }
    .topic-card.active .detail-panel { display: block; }

    .detail-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab-btn {
      padding: 10px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }

    .tab-content { display: none; padding: 20px; min-width: 0; overflow: hidden; }
    .tab-content.active { display: block; }

    /* Equations */
    .eq-list { display: flex; flex-direction: column; gap: 10px; }
    .eq-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .eq-item .eq-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .eq-item .eq-note { font-size: 0.78rem; color: var(--muted); margin-top: 8px; word-break: break-word; }
    .eq-formula { overflow-x: auto; overflow-y: hidden; max-width: 100%; -webkit-overflow-scrolling: touch; }

    /* Details */
    .rule-list { display: flex; flex-direction: column; gap: 10px; }
    .rule-item {
      background: var(--card);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 12px 14px;
      font-size: 0.84rem;
      line-height: 1.6;
      overflow-x: auto;
      min-width: 0;
    }
    .rule-item strong { color: var(--accent2); }
    .rule-item code {
      font-family: 'Courier New', monospace;
      background: rgba(108,99,255,0.12);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.88em;
      color: #a78bfa;
    }

    .section-title {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin: 16px 0 6px;
      font-weight: 700;
    }
    .section-title:first-child { margin-top: 0; }

    /* Practice */
    .practice-list { display: flex; flex-direction: column; gap: 14px; }
    .practice-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .practice-q {
      padding: 14px 16px;
      font-size: 0.85rem;
      line-height: 1.6;
      cursor: pointer;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      transition: background 0.15s;
    }
    .practice-q:hover { background: rgba(108,99,255,0.05); }
    .q-num {
      flex-shrink: 0;
      width: 22px; height: 22px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      margin-top: 1px;
    }
    .q-text { flex: 1; }
    .q-toggle { flex-shrink: 0; color: var(--muted); font-size: 0.7rem; transition: transform 0.2s; }
    .practice-item.show-ans .q-toggle { transform: rotate(180deg); }

    .practice-ans {
      display: none;
      padding: 12px 16px 14px 48px;
      border-top: 1px solid var(--border);
      font-size: 0.83rem;
      line-height: 1.6;
      color: var(--muted);
      background: rgba(0,212,170,0.04);
    }
    .practice-item.show-ans .practice-ans { display: block; }
    .practice-ans .ans-label { font-size: 0.68rem; color: var(--accent2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .practice-ans .step { margin-bottom: 4px; }

    /* KaTeX overrides */
    .katex { color: var(--accent2); }
    .eq-item .katex { font-size: 1.05rem; }
    .practice-q .katex, .practice-ans .katex { font-size: 0.9rem; color: #a78bfa; }
    .rule-item .katex { font-size: 0.88rem; color: #a78bfa; }

    /* Prevent KaTeX display math from overflowing */
    .katex-display {
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100%;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .katex-display > .katex { max-width: none; }

    /* Global overflow safety */
    .eq-item, .rule-item, .practice-q, .practice-ans, .hint-body {
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .result-badges { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
    @media (max-width: 480px) {
      .result-badges { flex-wrap: wrap; }
      .eq-item .katex { font-size: 0.95rem; }
    }

    /* Analyzer FAB */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1.4rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(108,99,255,0.4);
      z-index: 100;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .fab:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(108,99,255,0.5); }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-size: 1rem; font-weight: 700; }
    .modal-header p { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 4px; }
    .modal-close:hover { color: var(--text); }

    .modal-body { padding: 20px 24px; }

    .input-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .input-tab {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .input-tab.active { background: var(--accent); border-color: var(--accent); color: white; }

    .input-panel { display: none; }
    .input-panel.active { display: block; }

    .q-textarea {
      width: 100%;
      min-height: 120px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .q-textarea:focus { border-color: var(--accent); }
    .q-textarea::placeholder { color: var(--muted); }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover { border-color: var(--accent); background: rgba(108,99,255,0.04); }
    .upload-zone.has-image { border-color: var(--accent2); border-style: solid; }
    .upload-zone .upload-icon { font-size: 2rem; margin-bottom: 8px; }
    .upload-zone p { color: var(--muted); font-size: 0.84rem; }
    .upload-zone .img-preview { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 10px; }
    #imageInput { display: none; }

    .analyze-btn {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .analyze-btn:hover { opacity: 0.9; }
    .analyze-btn:active { transform: scale(0.98); }
    .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Results */
    .result-area { margin-top: 20px; }
    .result-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .badge {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .badge-section-quant { background: rgba(108,99,255,0.2); border: 1px solid rgba(108,99,255,0.4); color: #a78bfa; }
    .badge-section-verbal { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .badge-section-data { background: rgba(251,146,60,0.15); border: 1px solid rgba(251,146,60,0.3); color: #fb923c; }
    .badge-topic { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--text); }
    .badge-type { background: rgba(0,212,170,0.15); border: 1px solid rgba(0,212,170,0.3); color: var(--accent2); }

    .hints-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); font-weight: 700; margin-bottom: 10px; }
    .hint-cards { display: flex; flex-direction: column; gap: 8px; }
    .hint-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .hint-header {
      padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .hint-header:hover { background: rgba(255,255,255,0.03); }
    .hint-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .hint-num.h1 { background: rgba(250,204,21,0.2); color: #fbbf24; border: 1px solid rgba(250,204,21,0.3); }
    .hint-num.h2 { background: rgba(251,146,60,0.2); color: #fb923c; border: 1px solid rgba(251,146,60,0.3); }
    .hint-num.h3 { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .hint-label { font-size: 0.8rem; color: var(--muted); flex: 1; }
    .hint-arrow { font-size: 0.7rem; color: var(--muted); transition: transform 0.2s; }
    .hint-card.revealed .hint-arrow { transform: rotate(180deg); }
    .hint-body {
      display: none;
      padding: 0 16px 14px 50px;
      font-size: 0.84rem;
      line-height: 1.6;
      color: var(--text);
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .hint-card.revealed .hint-body { display: block; }

    .error-msg { color: #f87171; font-size: 0.84rem; margin-top: 12px; text-align: center; }
    .loading-dots { text-align: center; padding: 20px; color: var(--muted); font-size: 0.9rem; }

    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .hub { grid-template-columns: 1fr; }
      .fab { bottom: 20px; right: 20px; }
    }
  </style>
</head>
<body>

<header>
  <h1>GMAT Focus — Equation Guide</h1>
  <p>Click any topic to explore equations, rules, and practice problems.</p>
</header>

<div class="hub" id="hub"></div>

<!-- FAB -->
<button class="fab" onclick="openAnalyzer()" title="Analyze a question">🔍</button>

<!-- Analyzer Modal -->
<div class="modal-overlay" id="analyzerModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h3>🧠 Question Analyzer</h3>
        <p>Quant · Verbal · Data Insights — paste or screenshot any GMAT question for hints.</p>
      </div>
      <button class="modal-close" onclick="closeAnalyzer()">✕</button>
    </div>
    <div class="modal-body">
      <div class="input-tabs">
        <button class="input-tab active" onclick="switchInput('text')">📝 Paste Text</button>
        <button class="input-tab" onclick="switchInput('image')">📸 Screenshot</button>
      </div>

      <div class="input-panel active" id="panel-text">
        <textarea class="q-textarea" id="questionText" placeholder="Paste your GMAT question here…"></textarea>
      </div>

      <div class="input-panel" id="panel-image">
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('imageInput').click()">
          <div class="upload-icon">📷</div>
          <p>Click to upload or drag & drop a screenshot</p>
          <img id="imgPreview" class="img-preview" style="display:none" />
        </div>
        <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)" />
      </div>

      <button class="analyze-btn" id="analyzeBtn" onclick="analyzeQuestion()">Analyze Question →</button>

      <div class="result-area" id="resultArea" style="display:none"></div>
    </div>
  </div>
</div>

<script>
const topics = [
  {
    icon: "➗",
    title: "Fractions & Operations",
    preview: "\\(\\frac{a}{b} \\pm \\frac{c}{d} = \\frac{ad \\pm bc}{bd}\\)",
    desc: "Adding, subtracting, multiplying, dividing fractions",
    equations: [
      { label: "Add — same denominator", formula: "$$\\frac{a}{b} + \\frac{c}{b} = \\frac{a+c}{b}$$" },
      { label: "Add — different denominators", formula: "$$\\frac{a}{b} + \\frac{c}{d} = \\frac{ad+bc}{bd}$$" },
      { label: "Subtract — different denominators", formula: "$$\\frac{a}{b} - \\frac{c}{d} = \\frac{ad-bc}{bd}$$" },
      { label: "Multiply fractions", formula: "$$\\frac{a}{b} \\times \\frac{c}{d} = \\frac{ac}{bd}$$" },
      { label: "Divide fractions", formula: "$$\\frac{a}{b} \\div \\frac{c}{d} = \\frac{a}{b} \\times \\frac{d}{c} = \\frac{ad}{bc}$$" },
      { label: "Compare size (Bow Tie)", formula: "$$\\frac{a}{b} > \\frac{c}{d} \\text{ if } ad > bc$$" },
      { label: "Square of a fraction", formula: "$$\\left(\\frac{a}{b}\\right)^2 = \\frac{a^2}{b^2}$$" },
      { label: "Square root of a fraction", formula: "$$\\sqrt{\\frac{a}{b}} = \\frac{\\sqrt{a}}{\\sqrt{b}}$$" },
    ],
    details: [
      { type: "rule", text: "<strong>Reciprocal:</strong> The reciprocal of \\(x\\) is \\(\\frac{1}{x}\\). Flip the fraction: reciprocal of \\(\\frac{3}{4}\\) is \\(\\frac{4}{3}\\)." },
      { type: "rule", text: "<strong>Bow Tie example:</strong> Compare \\(\\frac{3}{5}\\) vs \\(\\frac{4}{7}\\) → \\(3 \\times 7 = 21\\), \\(4 \\times 5 = 20\\) → \\(21 > 20\\) → \\(\\frac{3}{5} > \\frac{4}{7}\\)" },
      { type: "rule", text: "<strong>Convert to %:</strong> Divide numerator by denominator → multiply by 100 → add %." },
      { type: "rule", text: "<strong>Between 0 and 1:</strong> If \\(0 < x < 1\\), then \\(x^2 < x < \\sqrt{x}\\). Squaring shrinks it; rooting grows it." },
    ],
    practice: [
      {
        q: "[Computation] Simplify: \\(\\frac{2}{5} + \\frac{3}{4}\\)",
        steps: [
          "Different denominators → use \\(\\frac{ad+bc}{bd}\\)",
          "\\(= \\frac{2 \\times 4 + 3 \\times 5}{5 \\times 4} = \\frac{8+15}{20} = \\frac{23}{20}\\)",
          "<strong>Answer: \\(\\frac{23}{20}\\)</strong>"
        ]
      },
      {
        q: "[Comparison] Which is larger: \\(\\frac{5}{8}\\) or \\(\\frac{7}{11}\\)?",
        steps: [
          "Bow Tie: \\(5 \\times 11 = 55\\) vs \\(7 \\times 8 = 56\\)",
          "\\(56 > 55\\) → <strong>\\(\\frac{7}{11} > \\frac{5}{8}\\)</strong>"
        ]
      },
      {
        q: "[Conceptual] If \\(0 < x < 1\\), which is greatest: \\(x\\), \\(x^2\\), or \\(\\sqrt{x}\\)?",
        steps: [
          "Try \\(x = \\frac{1}{4}\\): \\(x^2 = \\frac{1}{16}\\), \\(\\sqrt{x} = \\frac{1}{2}\\)",
          "\\(\\frac{1}{16} < \\frac{1}{4} < \\frac{1}{2}\\) → <strong>\\(\\sqrt{x}\\) is greatest</strong>"
        ]
      },
      {
        q: "[Computation] Simplify: \\(\\dfrac{\\frac{3}{4}}{\\frac{9}{16}}\\)",
        steps: [
          "Dividing fractions → multiply by reciprocal",
          "\\(= \\frac{3}{4} \\times \\frac{16}{9} = \\frac{48}{36} = \\frac{4}{3}\\)",
          "<strong>Answer: \\(\\frac{4}{3}\\)</strong>"
        ]
      },
      {
        q: "[Word Problem] A tank is \\(\\frac{3}{5}\\) full. After adding 12 litres it is \\(\\frac{4}{5}\\) full. What is the tank's total capacity?",
        steps: [
          "\\(\\frac{4}{5} - \\frac{3}{5} = \\frac{1}{5}\\) of the tank = 12 litres",
          "Total capacity \\(= 12 \\times 5 = 60\\) litres",
          "<strong>Answer: 60 litres</strong>"
        ]
      },
      {
        q: "[DS-style] Is \\(\\frac{x}{y} > 1\\)? Given: (1) \\(x > y\\); (2) \\(y > 0\\).",
        steps: [
          "Statement (1) alone: \\(x > y\\), but if both negative (e.g. \\(x=-1, y=-2\\)), \\(\\frac{-1}{-2} = 0.5 < 1\\). Not sufficient.",
          "Statement (2) alone: only tells us \\(y > 0\\), says nothing about \\(x\\). Not sufficient.",
          "Both together: \\(x > y > 0\\) → dividing both sides by positive \\(y\\) → \\(\\frac{x}{y} > 1\\). <strong>Sufficient.</strong>",
          "<strong>Answer: Both statements together are needed (C)</strong>"
        ]
      },
      {
        q: "[Conversion] Express \\(\\frac{7}{8}\\) as a percentage.",
        steps: [
          "\\(\\frac{7}{8} = 0.875\\)",
          "\\(0.875 \\times 100 = 87.5\\%\\)",
          "<strong>Answer: 87.5%</strong>"
        ]
      }
    ]
  },
  {
    icon: "📐",
    title: "Linear & Quadratic Equations",
    preview: "\\(ax^2 + bx + c = 0\\)",
    desc: "Factoring, FOILing, quadratic identities",
    equations: [
      { label: "Factor common terms", formula: "$$ab + ac = a(b+c)$$" },
      { label: "General quadratic form", formula: "$$ax^2 + bx + c = 0$$" },
      { label: "Factored form (where p·q = c, p+q = b)", formula: "$$(x+p)(x+q) = 0$$" },

      { label: "Zero exponent", formula: "$$x^0 = 1 \\quad (x \\neq 0)$$" },
      { label: "Negative exponent", formula: "$$x^{-a} = \\frac{1}{x^a}$$" },
      { label: "Units digit — cycle-4 bases", formula: "$$2: 2{\\to}4{\\to}8{\\to}6 \\quad 3: 3{\\to}9{\\to}7{\\to}1 \\quad 7: 7{\\to}9{\\to}3{\\to}1 \\quad 8: 8{\\to}4{\\to}2{\\to}6$$", note: "Find remainder of exponent ÷ 4, then pick that position in the cycle." },
      { label: "Units digit — cycle-2 bases", formula: "$$4: 4{\\to}6 \\quad 9: 9{\\to}1 \\quad (\\text{odd power} = \\text{first}, \\text{even power} = \\text{second})$$" },
      { label: "Units digit — fixed bases", formula: "$$0 \\to 0 \\quad 1 \\to 1 \\quad 5 \\to 5 \\quad 6 \\to 6 \\quad (\\text{always})$$" },
    ],
    details: [
      { type: "title", text: "Powers of 2" },
      { type: "rule", text: "\\(2^1=2,\\ 2^2=4,\\ 2^3=8,\\ 2^4=16,\\ 2^5=32,\\ 2^6=64,\\ 2^7=128,\\ 2^8=256,\\ 2^9=512,\\ 2^{10}=1024\\)" },
      { type: "title", text: "Powers of 3, 4, 5" },
      { type: "rule", text: "\\(3^1=3,\\ 3^2=9,\\ 3^3=27,\\ 3^4=81,\\ 3^5=243\\)<br>\\(4^1=4,\\ 4^2=16,\\ 4^3=64,\\ 4^4=256\\)<br>\\(5^1=5,\\ 5^2=25,\\ 5^3=125,\\ 5^4=625\\)" },
      { type: "title", text: "How to Find Any Units Digit" },
      { type: "rule", text: "1. Identify the base's units digit.<br>2. Find its cycle length (4 for 2,3,7,8 — 2 for 4,9 — 1 for 0,1,5,6).<br>3. Divide the exponent by the cycle length, take the remainder.<br>4. Remainder 0 = last in cycle.<br><em>Example: \\(3^{47}\\) → cycle 3,9,7,1 → \\(47 \\div 4 = 11\\) rem 3 → 3rd in cycle = <strong>7</strong></em>" },
    ],
    practice: [
      {
        q: "[Units Digit] What is the units digit of \\(7^{23}\\)?",
        steps: [
          "Cycle for 7: 7→9→3→1 (every 4)",
          "\\(23 \\div 4\\) = rem 3 → 3rd in cycle = 3",
          "<strong>Answer: 3</strong>"
        ]
      },
      {
        q: "[Like Bases] Simplify: \\(\\dfrac{4^6 \\cdot 4^2}{4^5}\\)",
        steps: [
          "Numerator: \\(4^{6+2} = 4^8\\)",
          "\\(\\frac{4^8}{4^5} = 4^3 = 64\\)",
          "<strong>Answer: 64</strong>"
        ]
      },
      {
        q: "[Solve for Exponent] If \\(2^x = 64\\), what is \\(x\\)?",
        steps: [
          "\\(64 = 2^6\\)",
          "<strong>Answer: \\(x = 6\\)</strong>"
        ]
      },
      {
        q: "[Negative Exponent] Simplify: \\(\\dfrac{3^5}{3^8}\\)",
        steps: [
          "\\(= 3^{5-8} = 3^{-3} = \\frac{1}{3^3} = \\frac{1}{27}\\)",
          "<strong>Answer: \\(\\frac{1}{27}\\)</strong>"
        ]
      },
      {
        q: "[Comparison] Which is greater: \\(2^{30}\\) or \\(3^{20}\\)?",
        steps: [
          "Rewrite with same exponent base: \\(2^{30} = (2^3)^{10} = 8^{10}\\); \\(3^{20} = (3^2)^{10} = 9^{10}\\)",
          "\\(9^{10} > 8^{10}\\)",
          "<strong>Answer: \\(3^{20} > 2^{30}\\)</strong>"
        ]
      },
      {
        q: "[Power to a Power] Simplify: \\((2^3)^4 \\cdot 2^{-5}\\)",
        steps: [
          "\\((2^3)^4 = 2^{12}\\)",
          "\\(2^{12} \\cdot 2^{-5} = 2^{12-5} = 2^7 = 128\\)",
          "<strong>Answer: 128</strong>"
        ]
      },
      {
        q: "[Units Digit — Large Power] What is the units digit of \\(3^{100}\\)?",
        steps: [
          "Cycle for 3: 3→9→7→1 (every 4)",
          "\\(100 \\div 4 = 25\\) rem 0 → remainder 0 means last in cycle = 1",
          "<strong>Answer: 1</strong>"
        ]
      }
    ]
  },
  {
    icon: "📋",
    title: "PEMDAS",
    preview: "\\(P \\to E \\to MD \\to AS\\)",
    desc: "Order of operations & distributive property",
    equations: [
      { label: "Order of operations", formula: "$$\\underbrace{P}_{\\text{Parentheses}} \\to \\underbrace{E}_{\\text{Exponents}} \\to \\underbrace{MD}_{\\text{Mult/Div}} \\to \\underbrace{AS}_{\\text{Add/Sub}}$$" },
      { label: "Distributive property", formula: "$$a(b+c) = ab + ac$$" },
      { label: "Reverse distribution (factoring)", formula: "$$ab + ac = a(b+c)$$" },
    ],
    details: [
      { type: "rule", text: "<strong>P</strong>arentheses — always resolve \\((\\ldots)\\) first." },
      { type: "rule", text: "<strong>E</strong>xponents — evaluate all powers/roots next." },
      { type: "rule", text: "<strong>M/D</strong> — Multiplication and Division left to right (equal priority)." },
      { type: "rule", text: "<strong>A/S</strong> — Addition and Subtraction left to right (equal priority)." },
      { type: "rule", text: "<strong>Distributive example:</strong> \\(4(x+y) = 4x + 4y\\)" },
    ],
    practice: [
      {
        q: "[Order of Operations] Evaluate: \\(3 + 4 \\times 2^2 - (5-3)\\)",
        steps: [
          "P: \\((5-3)=2\\) → E: \\(2^2=4\\) → M: \\(4 \\times 4=16\\) → A/S: \\(3+16-2=17\\)",
          "<strong>Answer: 17</strong>"
        ]
      },
      {
        q: "[Distributive] Simplify: \\(\\dfrac{4(x+3) - 12}{4}\\)",
        steps: [
          "Distribute: \\(4x + 12 - 12 = 4x\\)",
          "\\(\\frac{4x}{4} = x\\)",
          "<strong>Answer: \\(x\\)</strong>"
        ]
      },
      {
        q: "[Common Error] A student says \\(2 + 3 \\times 4 = 20\\). What's the correct answer?",
        steps: [
          "Multiplication before addition: \\(3 \\times 4 = 12\\) first",
          "Then: \\(2 + 12 = 14\\)",
          "<strong>Answer: 14 (not 20 — the student forgot PEMDAS)</strong>"
        ]
      },
      {
        q: "[Nested Expression] Evaluate: \\(2 \\times (3 + 4^2) - 10 \\div 2\\)",
        steps: [
          "P + E inside: \\(3 + 16 = 19\\)",
          "Multiply: \\(2 \\times 19 = 38\\)",
          "Divide: \\(10 \\div 2 = 5\\)",
          "Subtract: \\(38 - 5 = 33\\)",
          "<strong>Answer: 33</strong>"
        ]
      },
      {
        q: "[Factoring via Distributive] Factor: \\(6x^2 + 9x\\)",
        steps: [
          "GCF of \\(6x^2\\) and \\(9x\\) is \\(3x\\)",
          "\\(= 3x(2x + 3)\\)",
          "<strong>Answer: \\(3x(2x+3)\\)</strong>"
        ]
      }
    ]
  }
];

const hub = document.getElementById('hub');

topics.forEach((topic, i) => {
  const card = document.createElement('div');
  card.className = 'topic-card';
  card.id = `topic-${i}`;

  const eqItems = topic.equations.map(eq => `
    <div class="eq-item">
      <div class="eq-label">${eq.label}</div>
      <div class="eq-formula">${eq.formula}</div>
      ${eq.note ? `<div class="eq-note">${eq.note}</div>` : ''}
    </div>
  `).join('');

  let detailHTML = '<div class="rule-list">';
  topic.details.forEach(d => {
    if (d.type === 'title') {
      detailHTML += `<div class="section-title">${d.text}</div>`;
    } else {
      detailHTML += `<div class="rule-item">${d.text}</div>`;
    }
  });
  detailHTML += '</div>';

  const practiceHTML = topic.practice.map((p, j) => `
    <div class="practice-item" id="prac-${i}-${j}">
      <div class="practice-q" onclick="toggleAnswer(${i},${j})">
        <div class="q-num">${j+1}</div>
        <div class="q-text">${p.q}</div>
        <div class="q-toggle">▼</div>
      </div>
      <div class="practice-ans">
        <div class="ans-label">Solution</div>
        ${p.steps.map(s => `<div class="step">${s}</div>`).join('')}
      </div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="card-header" onclick="toggleCard(${i})">
      <div class="card-icon">${topic.icon}</div>
      <div class="card-meta">
        <h2>${topic.title}</h2>
        <div class="preview">${topic.preview}</div>
        <div class="desc">${topic.desc}</div>
      </div>
      <div class="expand-arrow">▼</div>
    </div>
    <div class="detail-panel">
      <div class="detail-tabs">
        <button class="tab-btn active" onclick="switchTab(event,${i},'eq')">📐 Equations</button>
        <button class="tab-btn" onclick="switchTab(event,${i},'detail')">📖 Rules</button>
        <button class="tab-btn" onclick="switchTab(event,${i},'practice')">✏️ Practice</button>
      </div>
      <div class="tab-content active" id="tab-eq-${i}">
        <div class="eq-list">${eqItems}</div>
      </div>
      <div class="tab-content" id="tab-detail-${i}">
        ${detailHTML}
      </div>
      <div class="tab-content" id="tab-practice-${i}">
        <div class="practice-list">${practiceHTML}</div>
      </div>
    </div>
  `;

  hub.appendChild(card);
});

function toggleCard(i) {
  const card = document.getElementById(`topic-${i}`);
  card.classList.toggle('active');
  if (card.classList.contains('active')) {
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function switchTab(e, i, tab) {
  e.stopPropagation();
  const card = document.getElementById(`topic-${i}`);
  card.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  card.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById(`tab-${tab}-${i}`).classList.add('active');
}

function toggleAnswer(i, j) {
  document.getElementById(`prac-${i}-${j}`).classList.toggle('show-ans');
}

// ── Analyzer ──────────────────────────────────────────────
let currentInputMode = 'text';
let uploadedImageData = null;
let uploadedMimeType = null;

function openAnalyzer() {
  document.getElementById('analyzerModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeAnalyzer() {
  document.getElementById('analyzerModal').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('analyzerModal').addEventListener('click', function(e) {
  if (e.target === this) closeAnalyzer();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeAnalyzer();
});

function switchInput(mode) {
  currentInputMode = mode;
  document.querySelectorAll('.input-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.input-panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(`panel-${mode}`).classList.add('active');
  document.getElementById('resultArea').style.display = 'none';
}

function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const result = ev.target.result;
    const base64 = result.split(',')[1];
    uploadedImageData = base64;
    uploadedMimeType = file.type;
    const preview = document.getElementById('imgPreview');
    preview.src = result;
    preview.style.display = 'block';
    const zone = document.getElementById('uploadZone');
    zone.classList.add('has-image');
    zone.querySelector('p').textContent = file.name;
  };
  reader.readAsDataURL(file);
}

// Drag & drop
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.style.borderColor = 'var(--accent2)'; });
uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor = ''; });
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.style.borderColor = '';
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const dt = new DataTransfer();
    dt.items.add(file);
    document.getElementById('imageInput').files = dt.files;
    handleImageUpload({ target: { files: [file] } });
  }
});

async function analyzeQuestion() {
  const btn = document.getElementById('analyzeBtn');
  const resultArea = document.getElementById('resultArea');

  let payload = {};
  if (currentInputMode === 'text') {
    const text = document.getElementById('questionText').value.trim();
    if (!text) { alert('Please paste a question first.'); return; }
    payload = { text };
  } else {
    if (!uploadedImageData) { alert('Please upload a screenshot first.'); return; }
    payload = { image: { data: uploadedImageData, mimeType: uploadedMimeType } };
  }

  btn.disabled = true;
  btn.textContent = 'Analyzing…';
  resultArea.style.display = 'block';
  resultArea.innerHTML = '<div class="loading-dots">🤔 Analyzing your question…</div>';

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (!res.ok || data.error) throw new Error(data.error || 'Something went wrong');

    const hintLabels = ['Gentle nudge', 'Point in the right direction', 'First concrete step'];
    const hintClasses = ['h1', 'h2', 'h3'];

    const sectionEmoji = { 'Quantitative Reasoning': '🔢', 'Verbal Reasoning': '📖', 'Data Insights': '📊' };
    const sectionClass = { 'Quantitative Reasoning': 'badge-section-quant', 'Verbal Reasoning': 'badge-section-verbal', 'Data Insights': 'badge-section-data' };
    const secEmoji = sectionEmoji[data.section] || '📚';
    const secClass = sectionClass[data.section] || 'badge-section-quant';

    resultArea.innerHTML = `
      <div class="result-badges">
        <span class="badge ${secClass}">${secEmoji} ${data.section}</span>
        <span class="badge badge-topic">📌 ${data.topic}</span>
        <span class="badge badge-type">🏷 ${data.questionType}</span>
      </div>
      <div class="hints-title">Progressive Hints — reveal when you're ready</div>
      <div class="hint-cards">
        ${data.hints.map((hint, i) => `
          <div class="hint-card" id="hint-${i}">
            <div class="hint-header" onclick="revealHint(${i})">
              <div class="hint-num ${hintClasses[i]}">${i+1}</div>
              <div class="hint-label">${hintLabels[i]}</div>
              <div class="hint-arrow">▼</div>
            </div>
            <div class="hint-body">${hint}</div>
          </div>
        `).join('')}
      </div>
    `;

    // Re-render math in result
    if (window.renderMathInElement) {
      renderMathInElement(resultArea, {
        delimiters: [
          {left:'$$',right:'$$',display:true},
          {left:'\\(',right:'\\)',display:false}
        ],
        throwOnError: false
      });
    }
  } catch (err) {
    resultArea.innerHTML = `<div class="error-msg">❌ ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Analyze Question →';
  }
}

function revealHint(i) {
  document.getElementById(`hint-${i}`).classList.toggle('revealed');
}
</script>
