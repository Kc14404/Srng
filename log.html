<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMAT Focus — Question Log</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left:'$$',right:'$$',display:true},
        {left:'\\(',right:'\\)',display:false}
      ],
      throwOnError: false
    })">
  </script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #22263a;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --text: #e8eaf0;
      --muted: #8b90a7;
      --border: #2e3248;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Nav bar */
    .site-nav {
      background: #1a1d27;
      border-bottom: 1px solid #2e3248;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
    }
    .nav-brand {
      font-weight: 800;
      font-size: 0.9rem;
      color: #6c63ff;
      padding: 14px 20px 14px 0;
      text-decoration: none;
      flex-shrink: 0;
      border-right: 1px solid #2e3248;
      margin-right: 8px;
    }
    .nav-link {
      padding: 14px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #8b90a7;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .nav-link:hover { color: #e8eaf0; }
    .nav-link.active { color: #00d4aa; border-bottom-color: #00d4aa; }

    header {
      background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 32px 24px 28px;
      text-align: center;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--muted); margin-top: 8px; font-size: 0.95rem; }

    .container { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }

    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 24px 0;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--accent2); }
    .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }

    /* Filter bar */
    .filter-bar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 20px;
    }
    .filter-bar input[type="text"],
    .filter-bar select {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 0.8rem;
      outline: none;
      font-family: inherit;
    }
    .filter-bar input[type="text"] { flex: 1; min-width: 150px; }
    .filter-bar input[type="text"]:focus,
    .filter-bar select:focus { border-color: var(--accent); }
    .filter-bar select { cursor: pointer; }

    .toggle-btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .toggle-btn.active { background: rgba(251,191,36,0.15); border-color: rgba(251,191,36,0.3); color: #fbbf24; }

    /* Question cards */
    .q-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .q-card-top {
      padding: 14px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .q-card-date { margin-left: auto; font-size: 0.72rem; color: var(--muted); white-space: nowrap; }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-section-quant { background: rgba(108,99,255,0.2); border: 1px solid rgba(108,99,255,0.4); color: #a78bfa; }
    .badge-section-verbal { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .badge-section-data { background: rgba(251,146,60,0.15); border: 1px solid rgba(251,146,60,0.3); color: #fb923c; }
    .badge-topic { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--text); }
    .badge-type { background: rgba(0,212,170,0.15); border: 1px solid rgba(0,212,170,0.3); color: var(--accent2); }
    .badge-diff-easy { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .badge-diff-medium { background: rgba(251,146,60,0.15); border: 1px solid rgba(251,146,60,0.3); color: #fb923c; }
    .badge-diff-hard { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }

    .q-card-preview {
      padding: 0 16px 12px;
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      cursor: pointer;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .q-card-preview.expanded {
      -webkit-line-clamp: unset;
      display: block;
    }

    .hint-count {
      padding: 0 16px 12px;
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 600;
    }

    .q-card-actions {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .q-card-actions button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .q-card-actions button:hover { border-color: var(--accent); color: var(--text); }
    .btn-bookmark.bookmarked { color: #fbbf24; border-color: rgba(251,191,36,0.4); background: rgba(251,191,36,0.1); }
    .btn-delete:hover { border-color: #f87171; color: #f87171; }
    .diff-override { min-width: 28px; text-align: center; }
    .diff-override.active-e { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.3); color: #4ade80; }
    .diff-override.active-m { background: rgba(251,146,60,0.15); border-color: rgba(251,146,60,0.3); color: #fb923c; }
    .diff-override.active-h { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); color: #f87171; }

    .btn-view-hints { margin-left: auto; }

    /* Hints expand */
    .q-card-hints {
      display: none;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .q-card-hints.open { display: block; }

    .hint-cards { display: flex; flex-direction: column; gap: 8px; }
    .hint-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .hint-header {
      padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .hint-header:hover { background: rgba(255,255,255,0.03); }
    .hint-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .hint-num.h1 { background: rgba(250,204,21,0.2); color: #fbbf24; border: 1px solid rgba(250,204,21,0.3); }
    .hint-num.h2 { background: rgba(251,146,60,0.2); color: #fb923c; border: 1px solid rgba(251,146,60,0.3); }
    .hint-num.h3 { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .hint-label { font-size: 0.8rem; color: var(--muted); flex: 1; }
    .hint-arrow { font-size: 0.7rem; color: var(--muted); transition: transform 0.2s; }
    .hint-card.revealed .hint-arrow { transform: rotate(180deg); }
    .hint-body {
      display: none;
      padding: 0 16px 14px 50px;
      font-size: 0.84rem;
      line-height: 1.6;
      color: var(--text);
      border-top: 1px solid var(--border);
      padding-top: 12px;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .hint-card.revealed .hint-body { display: block; }

    /* KaTeX overrides */
    .katex { color: var(--accent2); }
    .katex-display {
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100%;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state p { font-size: 0.95rem; line-height: 1.6; }
    .empty-state a { color: var(--accent2); text-decoration: none; }
    .empty-state a:hover { text-decoration: underline; }

    /* Bulk actions */
    .bulk-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .bulk-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .bulk-btn:hover { border-color: var(--accent); color: var(--text); }
    .bulk-btn.danger:hover { border-color: #f87171; color: #f87171; }

    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .filter-bar { flex-direction: column; }
      .filter-bar input[type="text"] { width: 100%; }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <a class="nav-brand" href="index.html">GMAT Hub</a>
  <a class="nav-link" href="index.html">📐 Math</a>
  <a class="nav-link" href="verbal.html">📖 Verbal</a>
  <a class="nav-link" href="di.html">📊 Data Insights</a>
  <a class="nav-link active" href="log.html">📋 Log</a>
</nav>

<header>
  <h1>Question Log</h1>
  <p>Your GMAT practice history</p>
</header>

<div class="container">
  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total Questions</div></div>
    <div class="stat-card"><div class="stat-value" id="statBookmarked">0</div><div class="stat-label">Bookmarked</div></div>
    <div class="stat-card"><div class="stat-value" id="statWeek">0</div><div class="stat-label">This Week</div></div>
    <div class="stat-card"><div class="stat-value" id="statHardest">—</div><div class="stat-label">Hardest Topic</div></div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <input type="text" id="filterSearch" placeholder="Search questions..." oninput="applyFilters()" />
    <select id="filterSection" onchange="applyFilters()">
      <option value="">All Sections</option>
      <option value="Quantitative Reasoning">Quantitative</option>
      <option value="Verbal Reasoning">Verbal</option>
      <option value="Data Insights">Data Insights</option>
    </select>
    <select id="filterDifficulty" onchange="applyFilters()">
      <option value="">All Difficulties</option>
      <option value="Easy">Easy</option>
      <option value="Medium">Medium</option>
      <option value="Hard">Hard</option>
    </select>
    <select id="filterType" onchange="applyFilters()">
      <option value="">All Types</option>
      <option value="Problem Solving">Problem Solving</option>
      <option value="Critical Reasoning">Critical Reasoning</option>
      <option value="Reading Comprehension">Reading Comprehension</option>
      <option value="Data Sufficiency">Data Sufficiency</option>
      <option value="Multi-Source Reasoning">Multi-Source Reasoning</option>
      <option value="Table Analysis">Table Analysis</option>
      <option value="Graphics Interpretation">Graphics Interpretation</option>
      <option value="Two-Part Analysis">Two-Part Analysis</option>
    </select>
    <button class="toggle-btn" id="filterBookmarked" onclick="toggleBookmarkFilter()">★ Bookmarked</button>
    <select id="filterSort" onchange="applyFilters()">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
    </select>
  </div>

  <!-- Bulk actions -->
  <div class="bulk-bar">
    <button class="bulk-btn danger" onclick="clearAll()">Clear All</button>
    <button class="bulk-btn" onclick="exportJSON()">Export as JSON</button>
  </div>

  <!-- Cards list -->
  <div id="cardList"></div>
</div>

<script>
let log = JSON.parse(localStorage.getItem('gmat_log') || '[]');
let bookmarkFilterActive = false;

function saveLog() {
  localStorage.setItem('gmat_log', JSON.stringify(log));
}

function getLog() { return log; }

function updateStats() {
  const all = getLog();
  document.getElementById('statTotal').textContent = all.length;
  document.getElementById('statBookmarked').textContent = all.filter(e => e.bookmarked).length;

  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
  document.getElementById('statWeek').textContent = all.filter(e => new Date(e.date) >= weekAgo).length;

  // Hardest topic: topic with most questions
  if (all.length) {
    const counts = {};
    all.forEach(e => { counts[e.topic] = (counts[e.topic] || 0) + 1; });
    const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
    const label = top[0].length > 16 ? top[0].slice(0, 15) + '…' : top[0];
    document.getElementById('statHardest').textContent = label;
  } else {
    document.getElementById('statHardest').textContent = '—';
  }
}

function applyFilters() {
  let items = [...getLog()];
  const search = document.getElementById('filterSearch').value.toLowerCase();
  const section = document.getElementById('filterSection').value;
  const diff = document.getElementById('filterDifficulty').value;
  const type = document.getElementById('filterType').value;
  const sort = document.getElementById('filterSort').value;

  if (search) items = items.filter(e => e.questionText.toLowerCase().includes(search));
  if (section) items = items.filter(e => e.section === section);
  if (diff) items = items.filter(e => e.difficulty === diff);
  if (type) items = items.filter(e => e.questionType === type);
  if (bookmarkFilterActive) items = items.filter(e => e.bookmarked);

  items.sort((a, b) => sort === 'newest' ? new Date(b.date) - new Date(a.date) : new Date(a.date) - new Date(b.date));

  renderCards(items);
}

function toggleBookmarkFilter() {
  bookmarkFilterActive = !bookmarkFilterActive;
  document.getElementById('filterBookmarked').classList.toggle('active', bookmarkFilterActive);
  applyFilters();
}

function getSectionClass(section) {
  const m = { 'Quantitative Reasoning': 'badge-section-quant', 'Verbal Reasoning': 'badge-section-verbal', 'Data Insights': 'badge-section-data' };
  return m[section] || 'badge-section-quant';
}
function getDiffClass(d) {
  const m = { 'Easy': 'badge-diff-easy', 'Medium': 'badge-diff-medium', 'Hard': 'badge-diff-hard' };
  return m[d] || 'badge-diff-medium';
}
function getDiffOverrideClass(d) {
  return { 'Easy': 'active-e', 'Medium': 'active-m', 'Hard': 'active-h' }[d] || '';
}
function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function renderCards(items) {
  const container = document.getElementById('cardList');

  if (!items.length) {
    if (!getLog().length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📝</div>
          <p>No questions logged yet.<br>Use the <a href="index.html">analyzer on any page</a> to get started.</p>
        </div>`;
    } else {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <p>No questions match your filters.</p>
        </div>`;
    }
    return;
  }

  const hintLabels = ['Gentle nudge', 'Point in the right direction', 'First concrete step'];
  const hintClasses = ['h1', 'h2', 'h3'];

  container.innerHTML = items.map(entry => `
    <div class="q-card" data-id="${entry.id}">
      <div class="q-card-top">
        <span class="badge ${getSectionClass(entry.section)}">${entry.section}</span>
        <span class="badge badge-topic">${entry.topic}</span>
        <span class="badge badge-type">${entry.questionType}</span>
        <span class="badge ${getDiffClass(entry.difficulty)}">${entry.difficulty}</span>
        <span class="q-card-date">${formatDate(entry.date)}</span>
      </div>
      <div class="q-card-preview" onclick="this.classList.toggle('expanded')">${escapeHtml(entry.questionText)}</div>
      <div class="hint-count">${entry.hints ? entry.hints.length + ' hints' : '0 hints'}</div>
      <div class="q-card-actions">
        <button class="btn-bookmark ${entry.bookmarked ? 'bookmarked' : ''}" onclick="toggleBookmark('${entry.id}')">★</button>
        <button class="btn-delete" onclick="deleteEntry('${entry.id}')">🗑</button>
        <button class="diff-override ${entry.difficulty === 'Easy' ? 'active-e' : ''}" onclick="setDifficulty('${entry.id}','Easy')">E</button>
        <button class="diff-override ${entry.difficulty === 'Medium' ? 'active-m' : ''}" onclick="setDifficulty('${entry.id}','Medium')">M</button>
        <button class="diff-override ${entry.difficulty === 'Hard' ? 'active-h' : ''}" onclick="setDifficulty('${entry.id}','Hard')">H</button>
        <button class="btn-view-hints" onclick="toggleHints('${entry.id}')">View Hints ▼</button>
      </div>
      <div class="q-card-hints" id="hints-${entry.id}">
        ${entry.hints ? `
          <div class="hint-cards">
            ${entry.hints.map((h, i) => `
              <div class="hint-card" onclick="this.classList.toggle('revealed')">
                <div class="hint-header">
                  <div class="hint-num ${hintClasses[i]}">${i + 1}</div>
                  <div class="hint-label">${hintLabels[i]}</div>
                  <div class="hint-arrow">▼</div>
                </div>
                <div class="hint-body">${escapeHtml(h)}</div>
              </div>
            `).join('')}
          </div>
        ` : ''}
      </div>
    </div>
  `).join('');

  // Re-render KaTeX
  if (window.renderMathInElement) {
    renderMathInElement(container, {
      delimiters: [{left:'$$',right:'$$',display:true},{left:'\\(',right:'\\)',display:false}],
      throwOnError: false
    });
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function toggleBookmark(id) {
  const entry = log.find(e => e.id === id);
  if (entry) { entry.bookmarked = !entry.bookmarked; saveLog(); updateStats(); applyFilters(); }
}

function deleteEntry(id) {
  if (!confirm('Delete this question from your log?')) return;
  log = log.filter(e => e.id !== id);
  saveLog(); updateStats(); applyFilters();
}

function setDifficulty(id, diff) {
  const entry = log.find(e => e.id === id);
  if (entry) { entry.difficulty = diff; saveLog(); applyFilters(); }
}

function toggleHints(id) {
  document.getElementById('hints-' + id).classList.toggle('open');
}

function clearAll() {
  if (!confirm('Are you sure you want to clear ALL logged questions? This cannot be undone.')) return;
  log = [];
  saveLog(); updateStats(); applyFilters();
}

function exportJSON() {
  const data = JSON.stringify(getLog(), null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gmat_log_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

// Init
updateStats();
applyFilters();
</script>
</body>
</html>
