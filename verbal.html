<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMAT Focus — Verbal Reasoning</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #22263a;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --text: #e8eaf0;
      --muted: #8b90a7;
      --border: #2e3248;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 32px 24px 28px;
      text-align: center;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--muted); margin-top: 8px; font-size: 0.95rem; }

    .hub {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .topic-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
      min-width: 0;
    }
    .topic-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 8px 30px rgba(108,99,255,0.15); }
    .topic-card.active { border-color: var(--accent2); }

    .card-header {
      padding: 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .card-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface);
      border-radius: 10px;
    }
    .card-meta h2 { font-size: 1rem; font-weight: 600; }
    .card-meta .preview {
      font-size: 0.82rem;
      color: var(--accent2);
      margin-top: 4px;
    }
    .card-meta .desc { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
    .expand-arrow { margin-left: auto; font-size: 0.75rem; color: var(--muted); transition: transform 0.3s; align-self: center; flex-shrink: 0; }
    .topic-card.active .expand-arrow { transform: rotate(180deg); }

    .detail-panel { display: none; background: var(--surface); border-top: 1px solid var(--border); }
    .topic-card.active .detail-panel { display: block; }

    .detail-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab-btn {
      padding: 10px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }

    .tab-content { display: none; padding: 20px; min-width: 0; overflow: hidden; }
    .tab-content.active { display: block; }

    /* Equations / Key Concepts */
    .eq-list { display: flex; flex-direction: column; gap: 10px; }
    .eq-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }
    .eq-item .eq-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .eq-item .eq-note { font-size: 0.78rem; color: var(--muted); margin-top: 8px; word-break: break-word; }
    .eq-chevron { float: right; font-size: 0.7rem; color: var(--muted); transition: transform 0.25s; line-height: 1.8; }
    .eq-item.open .eq-chevron { transform: rotate(180deg); }
    .eq-item .eq-detail { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .eq-item.open .eq-detail { max-height: 500px; }
    .eq-detail-inner { padding-top: 10px; margin-top: 8px; border-top: 1px solid var(--border); font-size: 0.82rem; color: #9aa3b8; line-height: 1.65; }
    .eq-formula {
      overflow-x: hidden;
      max-width: 100%;
      font-size: 0.92rem;
      color: var(--accent2);
      line-height: 1.6;
    }

    /* Details */
    .rule-list { display: flex; flex-direction: column; gap: 10px; }
    .rule-item {
      background: var(--card);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 12px 14px;
      font-size: 0.84rem;
      line-height: 1.6;
      overflow-x: auto;
      min-width: 0;
    }
    .rule-item strong { color: var(--accent2); }
    .rule-item code {
      font-family: 'Courier New', monospace;
      background: rgba(108,99,255,0.12);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.88em;
      color: #a78bfa;
    }

    .section-title {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin: 16px 0 6px;
      font-weight: 700;
    }
    .section-title:first-child { margin-top: 0; }

    /* Practice */
    .practice-list { display: flex; flex-direction: column; gap: 14px; }
    .practice-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .practice-q {
      padding: 14px 16px;
      font-size: 0.85rem;
      line-height: 1.6;
      cursor: pointer;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      transition: background 0.15s;
    }
    .practice-q:hover { background: rgba(108,99,255,0.05); }
    .q-num {
      flex-shrink: 0;
      width: 22px; height: 22px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      margin-top: 1px;
    }
    .q-text { flex: 1; }
    .q-toggle { flex-shrink: 0; color: var(--muted); font-size: 0.7rem; transition: transform 0.2s; }
    .practice-item.show-ans .q-toggle { transform: rotate(180deg); }

    .practice-ans {
      display: none;
      padding: 12px 16px 14px 48px;
      border-top: 1px solid var(--border);
      font-size: 0.83rem;
      line-height: 1.6;
      color: var(--muted);
      background: rgba(0,212,170,0.04);
    }
    .practice-item.show-ans .practice-ans { display: block; }
    .practice-ans .ans-label { font-size: 0.68rem; color: var(--accent2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .practice-ans .step { margin-bottom: 4px; }

    /* Global overflow safety */
    .eq-item, .rule-item, .practice-q, .practice-ans {
      overflow-wrap: break-word;
      word-break: break-word;
    }

    /* Nav bar */
    .site-nav {
      background: #1a1d27;
      border-bottom: 1px solid #2e3248;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
    }
    .nav-brand {
      font-weight: 800;
      font-size: 0.9rem;
      color: #6c63ff;
      padding: 14px 20px 14px 0;
      text-decoration: none;
      flex-shrink: 0;
      border-right: 1px solid #2e3248;
      margin-right: 8px;
    }
    .nav-link {
      padding: 14px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #8b90a7;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .nav-link:hover { color: #e8eaf0; }
    .nav-link.active { color: #00d4aa; border-bottom-color: #00d4aa; }

    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .hub { grid-template-columns: 1fr; }
    }
    .ref-term {
      color: #a78bfa;
      border-bottom: 1px dashed #a78bfa;
      cursor: pointer;
      position: relative;
      white-space: nowrap;
    }
    .ref-tip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e2130;
      border: 1px solid #3a3d50;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.78rem;
      color: #b0b8cc;
      line-height: 1.5;
      width: 230px;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      pointer-events: none;
    }
    .ref-term.tip-active .ref-tip { display: block; }

    .method-list { display: flex; flex-direction: column; gap: 14px; }
    .method-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .method-name { font-size: 0.95rem; font-weight: 600; color: var(--accent2); margin-bottom: 6px; }
    .method-when { font-size: 0.82rem; color: var(--muted); margin-bottom: 8px; }
    .method-steps { margin: 8px 0 8px 16px; font-size: 0.84rem; line-height: 1.7; color: #c8d0e0; }
    .method-steps li { margin-bottom: 4px; }
    .method-tip { font-size: 0.8rem; color: #a78bfa; font-style: italic; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

    .tq-list { display: flex; flex-direction: column; gap: 14px; }
    .tq-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .tq-header { padding: 16px; cursor: pointer; }
    .tq-header:hover { background: rgba(108,99,255,0.06); }
    .tq-type-badge { display: inline-block; font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; background: rgba(108,99,255,0.18); color: #a78bfa; border-radius: 4px; padding: 2px 8px; margin-bottom: 8px; }
    .tq-question { font-size: 0.88rem; color: #e0e4f0; line-height: 1.6; margin-bottom: 8px; }
    .tq-cta { font-size: 0.75rem; color: var(--muted); }
    .tq-item.open .tq-cta { display: none; }
    .tq-solution { display: none; border-top: 1px solid var(--border); padding: 16px; background: rgba(0,0,0,0.2); }
    .tq-item.open .tq-solution { display: block; }
    .tq-sol-section { margin-bottom: 12px; font-size: 0.84rem; line-height: 1.65; color: #b8c0d4; }
    .tq-sol-section strong { color: #e0e4f0; }
    .tq-steps { margin: 6px 0 0 16px; }
    .tq-steps li { margin-bottom: 5px; }

    /* ── Desktop Layout (≥1024px) ── */
    @media (min-width: 1024px) {
      body { display: flex; flex-direction: row; min-height: 100vh; overflow-x: hidden; }
      .dt-sidebar {
        width: 240px; min-width: 240px; height: 100vh; position: sticky; top: 0;
        background: #0e0f1a; border-right: 1px solid rgba(255,255,255,0.07);
        display: flex; flex-direction: column; padding: 0; overflow-y: auto; z-index: 100;
        scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
      }
      .dt-logo { display: flex; align-items: center; gap: 10px; padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,0.07); }
      .dt-logo-icon { font-size: 1.3rem; }
      .dt-logo-text { font-size: 1rem; font-weight: 700; color: #e0e4f0; letter-spacing: 0.02em; }
      .dt-nav { padding: 14px 12px 10px; }
      .dt-nav-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.3); padding: 0 8px; margin-bottom: 6px; }
      .dt-nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 7px; font-size: 0.84rem; color: rgba(255,255,255,0.55); text-decoration: none; transition: all 0.15s; margin-bottom: 2px; }
      .dt-nav-item:hover { background: rgba(255,255,255,0.06); color: #e0e4f0; }
      .dt-nav-item.dt-active { background: rgba(108,99,255,0.18); color: #a78bfa; font-weight: 600; }
      .dt-nav-icon { font-size: 0.95rem; width: 20px; text-align: center; }
      .dt-topics { padding: 10px 12px; border-top: 1px solid rgba(255,255,255,0.07); flex: 1; overflow-y: auto; }
      .dt-topics-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.3); padding: 0 8px; margin-bottom: 6px; }
      .dt-topic-link { display: block; padding: 7px 10px; border-radius: 6px; font-size: 0.8rem; color: rgba(255,255,255,0.45); text-decoration: none; cursor: pointer; transition: all 0.15s; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: none; background: none; width: 100%; text-align: left; }
      .dt-topic-link:hover { background: rgba(255,255,255,0.05); color: #c0c8dc; }
      .dt-topic-link.dt-topic-active { color: var(--accent2, #7dd3a8); font-weight: 500; }
      .dt-sidebar-footer { padding: 14px 12px; border-top: 1px solid rgba(255,255,255,0.07); }
      .dt-footer-btn { width: 100%; padding: 9px; background: rgba(108,99,255,0.12); border: 1px solid rgba(108,99,255,0.3); border-radius: 8px; color: #a78bfa; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
      .dt-footer-btn:hover { background: rgba(108,99,255,0.22); }
      .site-nav { display: none; }
      .dt-main-wrap { flex: 1; min-width: 0; overflow-x: hidden; }
      .hub { max-width: none; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 32px 36px; }
      .topic-card.active { grid-column: 1 / -1; }
      header { text-align: left; padding: 32px 36px 28px; }
    }
  </style>
</head>

<header>
  <h1>GMAT Focus — Verbal Reasoning</h1>
  <p>Critical Reasoning & Reading Comprehension — click any topic to explore concepts, rules, and practice.</p>
</header>

<div class="hub" id="hub"></div>

<script>
const topics = [
  {
    icon: "🏗️",
    title: "Argument Structure",
    preview: "Conclusion, Premise, Assumption, Logical Gap",
    desc: "Identifying the building blocks of GMAT arguments",
    equations: [
      { label: "Conclusion", formula: "The main point the author is trying to make", detail: "<strong>Definition:</strong> The main claim the author is trying to prove — the destination of the argument.<br><strong>Signal words:</strong> therefore, thus, so, hence, clearly, consequently, as a result.<br><strong>Note:</strong> The conclusion can appear anywhere — often NOT the first sentence.<br><strong>Common mistake:</strong> Assuming the first sentence is always the conclusion." },
      { label: "Premise", formula: "Evidence or facts used to support the conclusion", detail: "<strong>Definition:</strong> Stated facts or evidence used to support the conclusion.<br><strong>Signal words:</strong> because, since, as, given that, due to, for.<br><strong>Rule:</strong> Premises are always stated — never assumed. They are taken as true.<br><strong>Example:</strong> \"Sales rose 20% [premise] therefore our campaign worked [conclusion].\"" },
      { label: "Assumption", formula: "Unstated but required link between premise and conclusion", detail: "<strong>Definition:</strong> An unstated fact the argument MUST rely on — never written in the passage.<br><strong>How to find:</strong> Ask: \"What must be true for this conclusion to follow from the premises?\"<br><strong>How to confirm:</strong> Use the <span class=\"ref-term\">negation test<span class=\"ref-tip\"><strong>Negation Test:</strong> Negate the answer choice. If negating it causes the argument to fall apart, that answer IS the assumption.</span></span>.<br><strong>Note:</strong> Finding the assumption unlocks Weaken, Strengthen, and Assumption question types." },
      { label: "Logical Gap", formula: "The space between what's stated and what's concluded", detail: "<strong>Definition:</strong> The distance between what the premises state and what the conclusion claims.<br><strong>Strategy:</strong> Identify WHERE the argument makes an unjustified leap.<br><strong>Rule:</strong> The gap is where assumptions live — and where weakeners attack.<br><strong>Example:</strong> \"Sales rose [premise] → our ad campaign worked [conclusion]\" — gap: what about other causes?" },
      { label: "Counterargument", formula: "Evidence or reasoning that opposes the conclusion", detail: "<strong>Definition:</strong> Evidence or reasoning that challenges the conclusion.<br><strong>Note:</strong> Not every stimulus has a counterargument — but when it appears, the author usually dismisses it.<br><strong>GMAT use:</strong> Recognizing counterarguments is critical for Boldface questions.<br><strong>Signal words:</strong> however, although, despite, yet, but, critics argue." }
    ],
    details: [
      { type: "rule", text: "<strong>Conclusion signals:</strong> 'therefore', 'thus', 'so', 'hence', 'consequently'" },
      { type: "rule", text: "<strong>Premise signals:</strong> 'because', 'since', 'as', 'given that'" },
      { type: "rule", text: "<strong>Key rule:</strong> The assumption is NEVER explicitly stated in the argument" },
      { type: "rule", text: "<strong>Strategy:</strong> Always pre-think your answer before reading the answer choices" }
    ],
    practice: [
      {
        q: "\"Company X's profits rose 20% after launching a new ad campaign. Therefore, the ad campaign was effective.\" — What is the unstated assumption?",
        steps: [
          "The assumption is that no other factors (seasonal trends, price changes, market shifts) contributed to the profit increase.",
          "The argument assumes the ad campaign was the sole cause.",
          "<strong>Answer: No external factors caused the profit increase — only the ad campaign did.</strong>"
        ]
      },
      {
        q: "\"Studies show that students who eat breakfast score higher on tests. Therefore, schools should provide free breakfast to improve test scores.\" — What would most weaken this argument?",
        steps: [
          "Evidence that students who eat breakfast differ in other ways (e.g., come from wealthier families, sleep more) that independently affect test scores.",
          "This breaks the causal link between breakfast and scores.",
          "<strong>Answer: A confounding variable (wealth, sleep) explains both breakfast-eating and higher scores.</strong>"
        ]
      },
      {
        q: "\"Since the factory installed new filters, air quality complaints from nearby residents have dropped. The filters must be reducing pollution.\" — What would strengthen this conclusion?",
        steps: [
          "Evidence that no other changes occurred during the same period (e.g., no reduction in production, no weather changes).",
          "This eliminates alternative explanations for fewer complaints.",
          "<strong>Answer: No other factors changed — only the filters were introduced.</strong>"
        ]
      },
      {
        q: "\"All of our best-selling products were developed by Team Alpha. Therefore, Team Alpha is our most innovative team.\" — Identify the conclusion.",
        steps: [
          "Signal word: \"Therefore.\"",
          "Conclusion: \"Team Alpha is our most innovative team.\"",
          "Premise: \"All best-selling products were developed by Team Alpha.\"",
          "<strong>Answer: The conclusion is \"Team Alpha is our most innovative team.\"</strong>"
        ]
      },
      {
        q: "\"Crime rates have fallen every year since the city increased police patrols. Police patrols reduce crime.\" — Identify ALL premises in this argument.",
        steps: [
          "Premise 1: Crime rates have fallen every year.",
          "Premise 2: The city increased police patrols.",
          "These are the stated facts supporting the conclusion that patrols reduce crime.",
          "<strong>Answer: Two premises — falling crime rates and increased patrols.</strong>"
        ]
      }
    ],
    methods: [
      {
        name: "Conclusion-First Method",
        when: "Mapping any CR argument quickly",
        steps: ["Find the conclusion (look for 'therefore/thus/so')", "Find the premises (look for 'because/since')", "Identify what's assumed (the unstated link)"],
        tip: "Ask 'Why does the author believe this?' → premises. Ask 'What's the author trying to prove?' → conclusion."
      },
      {
        name: "Argument Mapping",
        when: "Visualizing complex arguments",
        steps: ["Draw: Premise₁ + Premise₂ → [GAP/ASSUMPTION] → Conclusion", "Label each component", "The gap is what you'll attack or support"],
        tip: "The gap always exists — there's always an unstated bridge."
      },
      {
        name: "Pre-thinking",
        when: "Before looking at answer choices",
        steps: ["Identify conclusion", "Find the assumption/gap", "Predict what a correct answer might say", "Then match to answer choices"],
        tip: "Pre-thinking eliminates 80% of trap answers before you even read them."
      }
    ],
    typicalQuestions: [
      {
        type: "Identify Conclusion",
        q: "\"City Y increased its police budget by 20%. Crime fell 15% the following year. Therefore, increased police funding reduces crime.\" — What is the conclusion?",
        identify: "'Therefore' signals the conclusion",
        method: "Conclusion-First",
        steps: ["Spot 'therefore'", "Everything after = conclusion: 'increased police funding reduces crime'", "Everything before = premises", "Answer: 'Increased police funding reduces crime.'"]
      },
      {
        type: "Identify Assumption",
        q: "Same argument — what is the key assumption?",
        identify: "Assumption = unstated bridge between premises and conclusion",
        method: "Ask 'what must be true for this to work?'",
        steps: ["Premises: budget +20%, crime −15%", "Conclusion: funding causes crime reduction", "Assumption: no other factor (new officers, season, demographics) caused the drop", "Answer: No other concurrent factor caused the crime reduction."]
      },
      {
        type: "Identify Premise",
        q: "\"All successful startups have strong leadership. TechCo has strong leadership. Therefore, TechCo will succeed.\" — How many premises?",
        identify: "Count statements that support the conclusion",
        method: "Find signal words (all, has)",
        steps: ["'All successful startups have strong leadership' = premise 1", "'TechCo has strong leadership' = premise 2", "Answer: 2 premises"]
      }
    ]
  },
  {
    icon: "⚡",
    title: "CR — Weaken",
    preview: "Attack the assumption, break the causal link",
    desc: "Finding alternative explanations and data flaws",
    equations: [
      { label: "Weaken", formula: "Attack the assumption (the unstated link)", detail: "<strong>Strategy:</strong> Find the assumption → find an answer that makes it less likely to be true.<br><strong>Rule:</strong> You are NOT disproving the conclusion — you are attacking the hidden link.<br><strong>Process:</strong> (1) Find conclusion → (2) Find assumption → (3) Pick answer that undermines assumption.<br><strong>Common mistake:</strong> Attacking the conclusion directly instead of the assumption." },

        steps: ["Eliminate 3 clearly wrong answers", "Of the 2 remaining, find the one with direct text support", "Never choose an answer without a specific line/paragraph to support it"],
        tip: "If you can't cite where in the passage the answer comes from, it's probably wrong."
      },
      {
        name: "Question Type Routing",
        when: "Applying the right strategy per question",
        steps: ["Identify question type from stem", "Main Idea → check full passage scope", "Detail → skim to find", "Inference → find most conservative supported conclusion", "Tone → note author language choices"],
        tip: null
      }
    ],
    typicalQuestions: [
      {
        type: "Main Idea",
        q: "A passage discusses how bees use the sun's position to navigate, describes waggle dance communication, and concludes that bee navigation is more sophisticated than previously thought. What is the main idea?",
        identify: "Main idea = topic + scope + author's stance",
        method: "SCOPE mapping",
        steps: ["Topic: bee navigation", "Claim: more sophisticated than thought", "Correct: 'The article argues that bees employ complex navigational methods that demonstrate higher sophistication than earlier research suggested.'", "Wrong: 'Bees use the sun to navigate' (too narrow) or 'All insects have sophisticated navigation' (too broad)", "Answer: Bee navigation is more sophisticated than previously believed."]
      },
      {
        type: "Inference",
        q: "The passage states: 'While solar panels have become 40% cheaper since 2015, adoption rates in rural areas remain below 10%.' — What can be inferred?",
        identify: "Inference from one passage statement",
        method: "Inference Ladder — stay conservative",
        steps: ["Facts: prices fell 40%, adoption <10% in rural areas", "Conservative inference: lower price alone hasn't driven rural adoption", "Does NOT infer: solar is failing, rural people dislike solar, etc.", "Answer: Price reduction alone has not been sufficient to drive widespread rural adoption."]
      },
      {
        type: "Tone",
        q: "Author uses: 'so-called experts claim,' 'the allegedly groundbreaking study,' 'proponents insist without evidence' — What is the author's tone?",
        identify: "Tone markers in language",
        method: "Identify modifier words",
        steps: ["'So-called' = dismissive", "'Allegedly' = skeptical", "'Without evidence' = critical", "Overall: skeptical/critical toward the experts", "Answer: Skeptical and critical."]
      }
    ]
  },
  {
    icon: "🎯",
    title: "RC — Question Types",
    preview: "Main Idea, Inference, Purpose, Tone",
    desc: "Mastering each RC question format",
    equations: [
      { label: "Main Idea", formula: "Topic + Scope + Author's Stance (not too broad, not too narrow)", detail: "<strong>Definition:</strong> The central thesis of the ENTIRE passage — not one paragraph, not one example.<br><strong>Test:</strong> Does every paragraph relate to this answer? If a paragraph seems off-topic, your answer is too narrow.<br><strong>Wrong answer patterns:</strong><br>— Too broad: goes beyond the passage's scope<br>— Too narrow: only captures part of the passage<br><strong>Formula:</strong> Topic + Scope + Author's Stance." },
      { label: "Inference", formula: "Must be 100% supported by passage text (no outside knowledge)", detail: "<strong>Rule:</strong> Must be 100% supported by passage text — stronger than \"probably\" or \"likely.\"<br><strong>Strategy:</strong> Eliminate anything that requires a logical step the passage doesn't take.<br><strong>Common mistake:</strong> Picking answers that \"could be true\" vs. answers that \"must be true.\"<br><strong>Tip:</strong> Correct inference answers often directly paraphrase something the passage implies." },
      { label: "Author's Purpose", formula: "WHY the author wrote the passage (to argue, analyze, compare, describe)", detail: "<strong>Definition:</strong> WHY the author wrote the passage — not WHAT it says.<br><strong>Common purpose verbs:</strong> argue, challenge, refute, analyze, compare, describe, illustrate, support, question.<br><strong>Rule:</strong> The verb matters as much as the topic — \"arguing\" ≠ \"analyzing.\"<br><strong>Example:</strong> An author presenting both sides isn't \"arguing\" — they're \"analyzing\" or \"comparing.\"" },
      { label: "Function", formula: "WHY a specific paragraph or sentence exists in the passage", detail: "<strong>Definition:</strong> WHY a specific sentence or paragraph is INCLUDED — what job does it do?<br><strong>Strategy:</strong> Zoom out — look at what comes before and after the specific part.<br><strong>Common functions:</strong> Provides evidence | Introduces counterargument | Gives concrete example | Transitions to new point.<br><strong>Rule:</strong> The function is always in service of the passage's larger argument." },
      { label: "Tone", formula: "HOW the author feels — positive (admiring, optimistic), negative (critical, skeptical), or neutral (objective)", detail: "<strong>Definition:</strong> HOW the author feels about the subject.<br><strong>Neutral signals:</strong> \"suggests,\" \"indicates,\" \"notes,\" \"describes.\"<br><strong>Critical signals:</strong> \"claims,\" \"allegedly,\" \"so-called,\" \"purportedly.\"<br><strong>Positive signals:</strong> \"demonstrates,\" \"clearly shows,\" \"importantly,\" \"fortunately.\"<br><strong>Rule:</strong> Eliminate extreme tones (scathing, ecstatic) unless the passage is genuinely extreme — academic writing rarely is." }
    ],
    details: [
      { type: "rule", text: "<strong>Main Idea wrong answers</strong> are either too broad (covers more than the passage) or too narrow (only covers one paragraph)" },
      { type: "rule", text: "<strong>Inference</strong> needs 100% text support — if any part is unsupported, eliminate it" },
      { type: "rule", text: "<strong>Purpose verbs to know:</strong> analyze, argue, challenge, compare, describe, evaluate, examine, propose, question, refute" },
      { type: "rule", text: "<strong>Tone spectrum:</strong> admiring → optimistic → cautiously optimistic → objective/neutral → cautious → skeptical → critical → dismissive" }
    ],
    practice: [
      {
        q: "A passage discusses the decline of coral reefs, focusing on how rising ocean temperatures are the primary cause. Main idea answer choices: (A) Coral reefs are dying worldwide. (B) Rising temperatures are the leading threat to coral reefs. (C) Ocean pollution harms marine life. — Eliminate wrong answers.",
        steps: [
          "(A) is too broad — it doesn't mention the specific cause.",
          "(C) is off-scope — the passage is about temperature, not pollution.",
          "(B) matches the Topic (coral reefs) + Scope (temperature as primary cause).",
          "<strong>Answer: (B) — it captures both the topic and the specific focus.</strong>"
        ]
      },
      {
        q: "The passage states: 'While Dr. Lee's findings were initially dismissed, subsequent studies largely confirmed her results.' Trap inference: 'Dr. Lee's findings are now universally accepted.' — Why is this wrong?",
        steps: [
          "\"Universally accepted\" goes beyond \"largely confirmed.\"",
          "\"Largely\" means mostly, not completely.",
          "A safe inference: \"Dr. Lee's findings have gained significant support from later research.\"",
          "<strong>Answer: Always match the strength of your inference to the passage language.</strong>"
        ]
      },
      {
        q: "A passage has 4 paragraphs: P1 introduces a problem, P2 describes a proposed solution, P3 presents criticisms of the solution, P4 argues the solution is still worthwhile despite flaws. What is the function of P3?",
        steps: [
          "P3 serves to acknowledge counterarguments before the author defends the solution in P4.",
          "Its function is \"to present objections that the author will subsequently address.\"",
          "<strong>Answer: P3 creates a concession-rebuttal structure (acknowledge then counter).</strong>"
        ]
      },
      {
        q: "An author writes about a controversial new technology: 'While concerns about privacy are not unfounded, the potential benefits to public health are substantial and should not be dismissed.' What is the author's tone?",
        steps: [
          "The author acknowledges negatives (\"concerns are not unfounded\") but emphasizes positives (\"substantial benefits,\" \"should not be dismissed\").",
          "This is neither fully positive nor negative — it's measured advocacy.",
          "<strong>Answer: Cautiously optimistic — balanced acknowledgment with a positive lean.</strong>"
        ]
      }
    ],
    methods: [
      {
        name: "Scope Bracket Method",
        when: "Main Idea questions",
        steps: ["Identify the narrowest the correct answer can be (must cover all paragraphs)", "Identify the broadest it can be (must not exceed what the passage discusses)", "Correct answer fits within this bracket"],
        tip: "Too narrow = only one paragraph; too broad = goes beyond the passage's scope."
      },
      {
        name: "100% Rule",
        when: "Inference questions",
        steps: ["Find a candidate answer", "Ask: 'Is there ANY scenario where this could be false, given the passage?'", "If yes — eliminate it", "Correct answer has 0% chance of being false given the text"],
        tip: "Words like 'all,' 'never,' 'only,' 'always' in an inference answer almost always make it too strong to be 100% supported."
      },
      {
        name: "Author Verb Test",
        when: "Author's Purpose questions",
        steps: ["Identify the main PURPOSE verb in each answer: 'to argue,' 'to describe,' 'to refute,' 'to compare'", "Eliminate answers where the verb doesn't match", "Then check the topic phrase for scope"],
        tip: "An author who presents both sides neutrally is 'analyzing' or 'comparing,' not 'arguing.'"
      }
    ],
    typicalQuestions: [
      {
        type: "Main Idea",
        q: "A passage has 3 paragraphs: (1) introduces a problem with plastic pollution (2) describes current recycling limitations (3) proposes biodegradable alternatives. Which main idea is correct: (A) 'Plastic pollution is a serious problem' (B) 'Current recycling is inadequate and biodegradable alternatives are needed' (C) 'All plastics should be replaced'",
        identify: "Main idea must cover ALL paragraphs",
        method: "Scope Bracket",
        steps: ["A: too narrow — only paragraph 1", "B: covers all 3 paragraphs ✓", "C: too extreme — 'all plastics' goes beyond what's stated", "Answer: B"]
      },
      {
        type: "Function",
        q: "In a passage about electric vehicles, paragraph 2 details a study where EV drivers had higher satisfaction than gas-car drivers. Why is this paragraph included?",
        identify: "Function = what JOB does this paragraph do?",
        method: "Zoom out — what does it support?",
        steps: ["Main argument: EVs are superior/gaining popularity", "Para 2 provides supporting evidence", "Function: to provide concrete data supporting the passage's main argument", "Answer: To provide empirical support for the claim that EVs offer a superior driving experience."]
      },
      {
        type: "Tone Shift",
        q: "The author begins by describing early enthusiasm for nuclear energy, then pivots to discussing unforeseen safety challenges. What is the author's overall tone?",
        identify: "Tone can shift — identify the NET tone",
        method: "Note the pivot",
        steps: ["Early: positive/enthusiastic tone about nuclear", "Pivot: 'however, unforeseen challenges'", "Net tone: balanced/cautionary — acknowledging both promise and problems", "Answer: Balanced and cautionary, acknowledging both early promise and subsequent challenges."]
      }
    ]
  }
];

const hub = document.getElementById('hub');

topics.forEach((topic, i) => {
  const card = document.createElement('div');
  card.className = 'topic-card';
  card.id = `topic-${i}`;

  const eqItems = topic.equations.map(eq => `
    <div class="eq-item">
      <div class="eq-label">${eq.label}<span class="eq-chevron">▼</span></div>
      <div class="eq-formula">${eq.formula}</div>
      ${eq.note ? `<div class="eq-note">${eq.note}</div>` : ''}
      ${eq.detail ? `<div class="eq-detail"><div class="eq-detail-inner">${eq.detail}</div></div>` : ''}
    </div>
  `).join('');

  let detailHTML = '<div class="rule-list">';
  topic.details.forEach(d => {
    if (d.type === 'title') {
      detailHTML += `<div class="section-title">${d.text}</div>`;
    } else {
      detailHTML += `<div class="rule-item">${d.text}</div>`;
    }
  });
  detailHTML += '</div>';

  const practiceHTML = topic.practice.map((p, j) => `
    <div class="practice-item" id="prac-${i}-${j}">
      <div class="practice-q" onclick="toggleAnswer(${i},${j})">
        <div class="q-num">${j+1}</div>
        <div class="q-text">${p.q}</div>
        <div class="q-toggle">▼</div>
      </div>
      <div class="practice-ans">
        <div class="ans-label">Solution</div>
        ${p.steps.map(s => `<div class="step">${s}</div>`).join('')}
      </div>
    </div>
  `).join('');

  const methodsHTML = topic.methods.map(m => `
    <div class="method-item">
      <div class="method-name">${m.name}</div>
      <div class="method-when"><em>Use when:</em> ${m.when}</div>
      <ol class="method-steps">
        ${m.steps.map(s => `<li>${s}</li>`).join('')}
      </ol>
      ${m.tip ? `<div class="method-tip">💡 ${m.tip}</div>` : ''}
    </div>
  `).join('');

  const tqHTML = topic.typicalQuestions.map((tq, j) => `
    <div class="tq-item" id="tq-${i}-${j}">
      <div class="tq-header" onclick="toggleTQ('tq-${i}-${j}')">
        <div class="tq-type-badge">${tq.type}</div>
        <div class="tq-question">${tq.q}</div>
        <div class="tq-cta">Tap to see how to solve ▼</div>
      </div>
      <div class="tq-solution">
        <div class="tq-sol-section"><strong>🔍 Identify:</strong> ${tq.identify}</div>
        <div class="tq-sol-section"><strong>📐 Method:</strong> ${tq.method}</div>
        <div class="tq-sol-section"><strong>📋 Steps:</strong>
          <ol class="tq-steps">
            ${tq.steps.map(s => `<li>${s}</li>`).join('')}
          </ol>
        </div>
      </div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="card-header" onclick="toggleCard(${i})">
      <div class="card-icon">${topic.icon}</div>
      <div class="card-meta">
        <h2>${topic.title}</h2>
        <div class="preview">${topic.preview}</div>
        <div class="desc">${topic.desc}</div>
      </div>
      <div class="expand-arrow">▼</div>
    </div>
    <div class="detail-panel">
      <div class="detail-tabs">
        <button class="tab-btn active" onclick="switchTab(event,${i},'eq')">📋 Key Concepts</button>
        <button class="tab-btn" onclick="switchTab(event,${i},'detail')">📖 Rules</button>
        <button class="tab-btn" onclick="switchTab(event,${i},'methods')">🔧 Key Methods</button>
        <button class="tab-btn" onclick="switchTab(event,${i},'tq')">❓ Typical Questions</button>
        <button class="tab-btn" onclick="switchTab(event,${i},'practice')">✏️ Practice</button>
      </div>
      <div class="tab-content active" id="tab-eq-${i}">
        <div class="eq-list">${eqItems}</div>
      </div>
      <div class="tab-content" id="tab-detail-${i}">
        ${detailHTML}
      </div>
      <div class="tab-content" id="tab-methods-${i}">
        <div class="method-list">${methodsHTML}</div>
      </div>
      <div class="tab-content" id="tab-tq-${i}">
        <div class="tq-list">${tqHTML}</div>
      </div>
      <div class="tab-content" id="tab-practice-${i}">
        <div class="practice-list">${practiceHTML}</div>
      </div>
    </div>
  `;

  hub.appendChild(card);
});

document.querySelectorAll('.eq-item').forEach(function(el) {
  el.addEventListener('click', function() { el.classList.toggle('open'); });
});

// Ref-term tooltip toggle (tap to show, tap elsewhere to hide)
document.addEventListener('click', function(e) {
  const term = e.target.closest('.ref-term');
  document.querySelectorAll('.ref-term.tip-active').forEach(function(el) {
    if (el !== term) el.classList.remove('tip-active');
  });
  if (term) {
    e.stopPropagation();
    term.classList.toggle('tip-active');
  }
});

function toggleCard(i) {
  const card = document.getElementById(`topic-${i}`);
  card.classList.toggle('active');
  if (card.classList.contains('active')) {
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function switchTab(e, i, tab) {
  e.stopPropagation();
  const card = document.getElementById(`topic-${i}`);
  card.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  card.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById(`tab-${tab}-${i}`).classList.add('active');
}

function toggleTQ(id) {
  const item = document.getElementById(id);
  item.classList.toggle('open');
}

function toggleAnswer(i, j) {
  document.getElementById(`prac-${i}-${j}`).classList.toggle('show-ans');
}
</script>
<script>
(function buildDesktopSidebar() {
  if (window.innerWidth < 1024) return;
  var path = window.location.pathname;
  var isIndex = path === '/' || path.endsWith('index.html') || path === '';
  var isVerbal = path.endsWith('verbal.html');
  var isDI = path.endsWith('di.html');
  var isLog = path.endsWith('log.html');
  function navItem(href, icon, label, active) {
    return '<a href="'+href+'" class="dt-nav-item'+(active?' dt-active':'')+'"><span class="dt-nav-icon">'+icon+'</span>'+label+'</a>';
  }
  var cards = document.querySelectorAll('.topic-card');
  var topicHTML = '';
  if (cards.length) {
    topicHTML = '<div class="dt-topics-label">Topics</div>';
    cards.forEach(function(card, i) {
      var title = (card.querySelector('h2') || card.querySelector('h3') || card.querySelector('.card-title') || {}).textContent || 'Topic '+(i+1);
      topicHTML += '<button class="dt-topic-link" data-card-idx="'+i+'" onclick="dtScrollToCard('+i+')">'+title+'</button>';
    });
  }
  var sidebar = document.createElement('aside');
  sidebar.className = 'dt-sidebar';
  sidebar.id = 'dt-sidebar';
  sidebar.innerHTML =
    '<div class="dt-logo"><span class="dt-logo-icon">\uD83C\uDF93</span><span class="dt-logo-text">GMAT Hub</span></div>' +
    '<nav class="dt-nav"><div class="dt-nav-label">Sections</div>' +
    navItem('index.html','\uD83D\uDCD0','Math',isIndex) +
    navItem('verbal.html','\uD83D\uDCAC','Verbal',isVerbal) +
    navItem('di.html','\uD83D\uDCCA','Data Insights',isDI) +
    navItem('log.html','\uD83D\uDCCB','Question Log',isLog) +
    '</nav>' +
    '<div class="dt-topics" id="dt-topics">'+topicHTML+'</div>' +
    '<div class="dt-sidebar-footer"><button class="dt-footer-btn" onclick="if(document.querySelector(\'.fab\'))document.querySelector(\'.fab\').click()">\uD83D\uDD0D Analyzer</button></div>';
  document.body.insertBefore(sidebar, document.body.firstChild);
  var wrap = document.createElement('div');
  wrap.className = 'dt-main-wrap';
  while (sidebar.nextSibling) wrap.appendChild(sidebar.nextSibling);
  document.body.appendChild(wrap);
})();
function dtScrollToCard(idx) {
  var cards = document.querySelectorAll('.topic-card');
  var card = cards[idx];
  if (!card) return;
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  if (!card.classList.contains('active')) {
    var header = card.querySelector('.card-header');
    if (header) header.click();
  }
  document.querySelectorAll('.dt-topic-link').forEach(function(el, i) {
    el.classList.toggle('dt-topic-active', i === idx);
  });
}
</script>
